<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Premium</title>

<style>

/* ----------------- VARIABLES ----------------- */

:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#111;
  --accent:#000;
  --shadow:0 8px 25px rgba(0,0,0,.08);
}

body.dark{
  --bg:#0f0f12;
  --card:#1a1a1f;
  --text:#fff;
  --accent:#fff;
  --shadow:0 8px 25px rgba(0,0,0,.4);
}

/* ----------------- GLOBAL ----------------- */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* ----------------- HEADER ----------------- */

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:var(--card);
  box-shadow:var(--shadow);
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-weight:700;
  font-size:20px;
  letter-spacing:1px;
}

.actions{
  display:flex;
  align-items:center;
  gap:20px;
}

.cart-icon{
  position:relative;
  cursor:pointer;
  font-size:22px;
}

.cart-count{
  position:absolute;
  top:-8px;
  right:-10px;
  background:red;
  color:white;
  font-size:12px;
  padding:3px 6px;
  border-radius:50%;
  transition:.2s;
}

.toggle-dark{
  cursor:pointer;
  font-size:18px;
}

/* ----------------- PRODUCTS ----------------- */

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:30px;
  padding:40px;
}

.product{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  box-shadow:var(--shadow);
  transition:.3s;
  text-align:center;
}

.product:hover{
  transform:translateY(-6px);
}

.product img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:15px;
}

.product button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:var(--bg);
  cursor:pointer;
  transition:.2s;
}

.product button:hover{
  opacity:.8;
}

/* ----------------- CART DRAWER ----------------- */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(4px);
  opacity:0;
  visibility:hidden;
  transition:.3s;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

.cart-drawer{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100%;
  background:var(--card);
  box-shadow:-10px 0 30px rgba(0,0,0,.2);
  padding:25px;
  transition:.4s cubic-bezier(.77,0,.18,1);
  display:flex;
  flex-direction:column;
}

.cart-drawer.active{
  right:0;
}

.cart-items{
  flex:1;
  overflow-y:auto;
  margin-bottom:15px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:14px;
}

.total{
  font-weight:bold;
  margin-bottom:15px;
}

.checkout{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#25D366;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.checkout:hover{
  transform:scale(1.05);
}

</style>
</head>
<body>

<header>
  <div class="logo">MASTER STORE</div>

  <div class="actions">
    <div class="toggle-dark">🌙</div>
    <div class="cart-icon">
      🛍
      <span class="cart-count">0</span>
    </div>
  </div>
</header>

<section class="products">

  <div class="product">
    <img src="https://picsum.photos/300/200?1">
    <h3>Producto 1</h3>
    <p>$100</p>
    <button onclick="addToCart('Producto 1',100)">Agregar</button>
  </div>

  <div class="product">
    <img src="https://picsum.photos/300/200?2">
    <h3>Producto 2</h3>
    <p>$200</p>
    <button onclick="addToCart('Producto 2',200)">Agregar</button>
  </div>

</section>

<div class="overlay"></div>

<div class="cart-drawer">
  <h3>Tu carrito</h3>
  <div class="cart-items"></div>
  <div class="total">Total: $0</div>
  <button class="checkout">📱 Pedir por WhatsApp</button>
</div>

<script>

let cart = [];

const cartIcon = document.querySelector(".cart-icon");
const cartDrawer = document.querySelector(".cart-drawer");
const overlay = document.querySelector(".overlay");
const cartItems = document.querySelector(".cart-items");
const totalDiv = document.querySelector(".total");
const cartCount = document.querySelector(".cart-count");

cartIcon.onclick = () => {
  cartDrawer.classList.add("active");
  overlay.classList.add("active");
};

overlay.onclick = () => {
  cartDrawer.classList.remove("active");
  overlay.classList.remove("active");
};

function addToCart(name,price){

  const existing = cart.find(p=>p.name===name);

  if(existing){
    existing.qty++;
  }else{
    cart.push({name,price,qty:1});
  }

  updateCart();
}

function updateCart(){

  cartItems.innerHTML="";
  let total=0;
  let count=0;

  cart.forEach(item=>{
    const subtotal=item.price*item.qty;
    total+=subtotal;
    count+=item.qty;

    cartItems.innerHTML+=`
      <div class="cart-item">
        <span>${item.name} x${item.qty}</span>
        <span>$${subtotal}</span>
      </div>
    `;
  });

  totalDiv.innerText="Total: $"+total;
  cartCount.innerText=count;
}

document.querySelector(".checkout").onclick=()=>{

  if(cart.length===0){
    alert("Carrito vacío");
    return;
  }

  let msg="🛒 Pedido:%0A%0A";

  cart.forEach(item=>{
    msg+=`${item.name} x${item.qty} - $${item.price*item.qty}%0A`;
  });

  msg+="%0AGracias 🙌";

  window.open("https://wa.me/3434508948?text="+msg,"_blank");
};

/* --------- DARK MODE --------- */

const toggle = document.querySelector(".toggle-dark");

if(window.matchMedia('(prefers-color-scheme: dark)').matches){
  document.body.classList.add("dark");
}

toggle.onclick=()=>{
  document.body.classList.toggle("dark");
};

</script>

</body>
</html>
