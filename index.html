<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Tienda Online</title>

  <style>
    body { font-family: Arial; margin:0; background:#f4f4f4; }
    header { background:#111; color:white; padding:15px; text-align:center; font-size:22px; }
    nav { background:#222; padding:10px; text-align:center; }
    nav a { color:white; margin:0 15px; cursor:pointer; text-decoration:none; }
    nav a:hover { text-decoration:underline; }

    section { display:none; padding:20px; }

    .grid { 
      display:grid; 
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); 
      gap:20px; 
    }

    .card { 
      background:white; 
      padding:10px; 
      border-radius:8px; 
      box-shadow:0 0 5px rgba(0,0,0,0.2); 
      text-align:center; 
    }

    .card img { 
      width:100%; 
      height:150px; 
      object-fit:cover; 
      border-radius:5px; 
    }

    .btn { 
      padding:8px 12px; 
      border:none; 
      border-radius:5px; 
      cursor:pointer; 
      margin-top:5px; 
    }

    .verde { background:green; color:white; }
    .rojo { background:red; color:white; }

    input { padding:6px; width:250px; }

    footer { 
      background:#111; 
      color:white; 
      text-align:center; 
      padding:10px; 
      margin-top:20px; 
    }
  </style>
</head>

<body>

<header>Mi Tienda Online</header>

<nav>
  <a onclick="mostrarSeccion('productos')">Productos</a>
  <a onclick="mostrarSeccion('carrito')">Carrito</a>
  <a onclick="mostrarSeccion('envio')">Envío</a>
  <a onclick="mostrarSeccion('admin')">Admin</a>
</nav>

<section id="productos">
  <h2>Productos</h2>
  <div class="grid" id="listaProductos"></div>
</section>

<section id="carrito">
  <h2>Carrito</h2>
  <div id="listaCarrito"></div>
  <h3>Total: $<span id="totalCarrito">0</span></h3>
</section>

<section id="envio">
  <h2>Datos de Envío</h2>
  <input type="text" id="nombre" placeholder="Nombre"><br><br>
  <input type="text" id="direccion" placeholder="Dirección"><br><br>
  <input type="text" id="telefono" placeholder="Teléfono"><br><br>
  <button class="btn verde" onclick="enviarPedido()">Enviar por WhatsApp</button>
</section>

<section id="admin">
  <h2>Panel Admin</h2>

  <input type="text" id="adminNombre" placeholder="Nombre producto"><br><br>
  <input type="number" id="adminPrecio" placeholder="Precio"><br><br>
  <input type="text" id="adminImagen" placeholder="URL Imagen"><br><br>
  <button class="btn verde" onclick="agregarProducto()">Agregar Producto</button>

  <hr>
  <div id="adminLista"></div>
</section>

<footer>© 2026 Mi Tienda Online</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_uELDR3InLuRlsxXCyFuIM4OzYw6xYkE",
  authDomain: "tienda-c497e.firebaseapp.com",
  projectId: "tienda-c497e",
  storageBucket: "tienda-c497e.firebasestorage.app",
  messagingSenderId: "709484748527",
  appId: "1:709484748527:web:64dbea8f89b02b830a851a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let carrito = [];

/* -------- Navegación -------- */

window.mostrarSeccion = function(id){
  document.querySelectorAll("section").forEach(sec => sec.style.display="none");
  document.getElementById(id).style.display="block";
}

/* -------- Cargar Productos -------- */

async function cargarProductos(){
  try{
    const querySnapshot = await getDocs(collection(db,"productos"));
    const cont = document.getElementById("listaProductos");
    const adminCont = document.getElementById("adminLista");

    cont.innerHTML="";
    adminCont.innerHTML="";

    querySnapshot.forEach(docSnap=>{
      const data = docSnap.data();

      cont.innerHTML += `
        <div class="card">
          <img src="${data.imagen}">
          <h4>${data.nombre}</h4>
          <p>$${data.precio}</p>
          <button class="btn verde" onclick="agregarCarrito('${data.nombre}',${data.precio})">
            Agregar al carrito
          </button>
        </div>
      `;

      adminCont.innerHTML += `
        <div>
          ${data.nombre} - $${data.precio}
          <button class="btn rojo" onclick="eliminarProducto('${docSnap.id}')">
            Eliminar
          </button>
        </div>
        <hr>
      `;
    });

  }catch(error){
    console.error("Error cargando productos:", error);
  }
}

/* -------- Carrito -------- */

window.agregarCarrito = function(nombre,precio){
  carrito.push({nombre,precio});
  mostrarCarrito();
}

window.eliminarCarrito = function(index){
  carrito.splice(index,1);
  mostrarCarrito();
}

function mostrarCarrito(){
  const cont = document.getElementById("listaCarrito");
  let total=0;
  cont.innerHTML="";

  carrito.forEach((item,index)=>{
    total+=item.precio;
    cont.innerHTML+=`
      <div>
        ${item.nombre} - $${item.precio}
        <button class="btn rojo" onclick="eliminarCarrito(${index})">
          Eliminar
        </button>
      </div>
    `;
  });

  document.getElementById("totalCarrito").innerText=total;
}

/* -------- WhatsApp -------- */

window.enviarPedido = function(){
  if(carrito.length===0){
    alert("El carrito está vacío");
    return;
  }

  const nombre = document.getElementById("nombre").value;
  const direccion = document.getElementById("direccion").value;
  const telefono = document.getElementById("telefono").value;

  let mensaje = "Pedido:%0A";

  carrito.forEach(item=>{
    mensaje+= `${item.nombre} - $${item.precio}%0A`;
  });

  mensaje+= `%0ANombre: ${nombre}%0ADirección: ${direccion}%0ATeléfono: ${telefono}`;

  window.open(`https://wa.me/5493434508948?text=${mensaje}`, "_blank");

  carrito=[];
  mostrarCarrito();
}

/* -------- Admin -------- */

window.agregarProducto = async function(){
  const nombre = document.getElementById("adminNombre").value;
  const precio = parseFloat(document.getElementById("adminPrecio").value);
  const imagen = document.getElementById("adminImagen").value;

  if(!nombre || !precio || !imagen){
    alert("Completa todos los campos");
    return;
  }

  await addDoc(collection(db,"productos"),{nombre,precio,imagen});

  document.getElementById("adminNombre").value="";
  document.getElementById("adminPrecio").value="";
  document.getElementById("adminImagen").value="";

  cargarProductos();
}

window.eliminarProducto = async function(id){
  await deleteDoc(doc(db,"productos",id));
  cargarProductos();
}

/* -------- Inicializar -------- */

mostrarSeccion("productos");
cargarProductos();

</script>

</body>
</html>
