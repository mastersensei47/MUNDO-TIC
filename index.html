<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1e293b;
position:sticky;
top:0;
}

.search-bar input{
padding:6px 10px;
border-radius:20px;
border:none;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1e293b;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:contain;
}

button{
background:#2563eb;
border:none;
padding:8px;
color:white;
border-radius:5px;
cursor:pointer;
}

.cart{
position:fixed;
right:-300px;
top:0;
width:300px;
height:100%;
background:#1e293b;
transition:.3s;
padding:10px;
display:flex;
flex-direction:column;
}

.cart.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.qty button{
width:25px;
height:25px;
}

.sidebar{
position:fixed;
left:-200px;
top:0;
width:200px;
height:100%;
background:#1e40af;
transition:.3s;
}

.sidebar.active{
left:0;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<span onclick="toggleSidebar()" style="cursor:pointer;font-size:20px;">☰</span>

<div class="search-bar">
<input id="searchInput" placeholder="Buscar..." onkeyup="render()">
</div>

<div>

<span id="modeLabel">Cliente</span>

<span onclick="toggleCart()" style="cursor:pointer;margin-left:10px;">
🛒 <span id="cartCount">0</span>
</span>

</div>

</header>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<a href="#">Inicio</a>

<a onclick="loginMayorista()">Mayorista</a>

</div>

<!-- PRODUCTOS -->

<div class="products" id="products"></div>

<!-- CARRITO -->

<div class="cart" id="cartDrawer">

<h3>Carrito</h3>

<div id="cartList" style="flex:1;overflow:auto;"></div>

<div>Total: <span id="cartTotal">$0</span></div>

<button onclick="enviarPedido()">Enviar WhatsApp</button>

</div>

<script>

/* PRODUCTOS DEMO */

let products = JSON.parse(localStorage.getItem("prods"));

if(!products){

products = [

{
name:"Bujía NGK",
p1:3500,
pm:2500,
img:"https://i.imgur.com/7Q9Z1Zm.png"
},

{
name:"Filtro Aire",
p1:8000,
pm:6000,
img:"https://i.imgur.com/YZ6XK8H.png"
},

{
name:"Aceite 10w40",
p1:12000,
pm:9000,
img:"https://i.imgur.com/3KXvY5K.png"
}

];

localStorage.setItem("prods",JSON.stringify(products));

}

/* USUARIO */

let userType = localStorage.getItem("userType") || "cliente";

document.getElementById("modeLabel").innerText =
userType === "mayorista" ? "Mayorista" : "Cliente";

/* CARRITO */

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* RENDER */

function render(){

const search = document.getElementById("searchInput").value.toLowerCase();

const container = document.getElementById("products");

container.innerHTML = products
.filter(p => p.name.toLowerCase().includes(search))
.map((p,i)=>{

let precio = userType==="mayorista" ? p.pm : p.p1;

return `

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<div>$${precio}</div>

<button onclick="add(${i})">Agregar</button>

</div>

`;

}).join("");

}

/* AGREGAR */

function add(i){

let item = cart.find(c=>c.id===i);

if(item) item.qty++;
else cart.push({id:i,qty:1});

updateCart();

}

/* ACTUALIZAR CARRITO */

function updateCart(){

let total = 0;
let count = 0;

document.getElementById("cartList").innerHTML = cart.map((c,idx)=>{

let p = products[c.id];

let precio = userType==="mayorista" ? p.pm : p.p1;

let sub = precio * c.qty;

total += sub;
count += c.qty;

return`

<div class="cart-item">

<div>${p.name}</div>

<div class="qty">

<button onclick="cart[${idx}].qty--;if(cart[${idx}].qty<=0)cart.splice(${idx},1);updateCart()">-</button>

<span>${c.qty}</span>

<button onclick="cart[${idx}].qty++;updateCart()">+</button>

</div>

</div>

`;

}).join("");

document.getElementById("cartTotal").innerText = "$"+total;

document.getElementById("cartCount").innerText = count;

localStorage.setItem("cart",JSON.stringify(cart));

}

/* LOGIN MAYORISTA */

function loginMayorista(){

let clave = prompt("Clave mayorista");

if(clave==="mayo123"){

userType="mayorista";

localStorage.setItem("userType","mayorista");

alert("Modo mayorista activado");

render();
updateCart();

}

}

/* WHATSAPP */

function enviarPedido(){

if(cart.length===0) return;

let detalle = cart.map(c=>{

let p = products[c.id];

return `- ${p.name} x${c.qty}`;

}).join("\n");

let total = document.getElementById("cartTotal").innerText;

let msg = `PEDIDO\n\n${detalle}\n\nTOTAL ${total}`;

window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);

}

/* UI */

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

function toggleCart(){
document.getElementById("cartDrawer").classList.toggle("active");
}

/* INICIO */

render();
updateCart();

</script>

</body>
</html>
