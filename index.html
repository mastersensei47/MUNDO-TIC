<script>

let products = JSON.parse(localStorage.getItem("prods")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let userType = localStorage.getItem("userType") || "cliente";

function render() {

const search = document.getElementById("searchInput").value.toLowerCase();

const container = document.getElementById("products");

container.innerHTML = products
.filter(p => p.name.toLowerCase().includes(search))
.map((p,i)=>{

let precio = (userType === "mayorista" && p.pm) ? p.pm : p.p1;

return `
<div class="card">
<img src="${p.img || 'https://via.placeholder.com/150'}">
<h4>${p.name}</h4>
<div style="color:var(--accent); font-weight:bold;">$${precio}</div>
<button onclick="add(${i})" style="margin-top:5px; font-size:12px;">+ Agregar</button>
</div>
`;

}).join("");

}

function filtrar(){
render();
}

function add(i){

const item = cart.find(c => c.id === i);

if(item){
item.qty++;
}else{
cart.push({id:i, qty:1});
}

updateCart();

}

function updateCart(){

let total = 0;
let count = 0;

document.getElementById("cartList").innerHTML = cart.map((c,idx)=>{

const p = products[c.id];

let precioBase;

if(userType === "mayorista" && p.pm){
precioBase = p.pm;
}else{

if(p.p2 > 0 && c.qty >= 2){
precioBase = null;
}else{
precioBase = p.p1;
}

}

let sub;

if(precioBase === null){
sub = (Math.floor(c.qty/2) * p.p2) + ((c.qty%2) * p.p1);
}else{
sub = precioBase * c.qty;
}

total += sub;
count += c.qty;

return `
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">

<div>
<b>${p.name}</b><br>
$${sub}
</div>

<div style="display:flex; gap:5px; align-items:center;">

<button onclick="cart[${idx}].qty--; if(cart[${idx}].qty<=0) cart.splice(${idx},1); updateCart()">-</button>

<span>${c.qty}</span>

<button onclick="cart[${idx}].qty++; updateCart()">+</button>

</div>

</div>
`;

}).join("");

document.getElementById("cartTotal").innerText = "$"+total;
document.getElementById("cartCount").innerText = count;

localStorage.setItem("cart", JSON.stringify(cart));

}

function enviarPedido(){

if(cart.length === 0) return;

const entrega = document.querySelector('input[name="delivery"]:checked').value;
const nom = document.getElementById("f_nom").value;

let det = cart.map(c => `- ${products[c.id].name} (x${c.qty})`).join("\n");

let totalStr = document.getElementById("cartTotal").innerText;

let msg = `NUEVO PEDIDO
----------
${det}
----------
TOTAL: ${totalStr}
ENTREGA: ${entrega}
CLIENTE: ${nom}`;

sales.push({
id: Date.now(),
fecha: new Date().toLocaleString(),
detalle: det,
total: totalStr,
cliente: nom
});

localStorage.setItem("sales", JSON.stringify(sales));

window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);

cart = [];
updateCart();
closeAll();

}

/* LOGIN MAYORISTA */

function loginMayorista(){

let clave = prompt("Clave mayorista");

if(clave === "mayo123"){

userType = "mayorista";

localStorage.setItem("userType","mayorista");

alert("Modo mayorista activado");

render();
updateCart();

}

}

/* ADMIN */

function showTab(id, btn){

document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

document.getElementById(id).classList.add('active');
btn.classList.add('active');

if(id === 'tab-ventas') renderSales();
if(id === 'tab-productos') renderAdminProds();

}

function abrirAdmin(){

if(prompt("Clave:") === "admin"){

document.getElementById("adminModal").style.display="flex";
renderAdminProds();

}

}

function guardar(){

const id = document.getElementById("editIdx").value;

const p = {

name: document.getElementById("n").value,
p1: parseInt(document.getElementById("p1").value),
p2: parseInt(document.getElementById("p2").value) || 0,
pm: parseInt(document.getElementById("pm").value) || 0,
st: parseInt(document.getElementById("st").value) || 0,
img: document.getElementById("im").value

};

if(id === ""){
products.push(p);
}else{
products[id] = p;
}

localStorage.setItem("prods", JSON.stringify(products));

renderAdminProds();
render();

}

function renderAdminProds(){

document.getElementById("adminProdList").innerHTML = products.map((p,i)=>`

<div class="product-list-item">

<span onclick="editar(${i})" style="cursor:pointer; color:cyan;">
${p.name} ($${p.p1})
</span>

<span onclick="eliminar(${i})" style="color:red; cursor:pointer;">
Borrar
</span>

</div>

`).join("");

}

function editar(i){

const p = products[i];

document.getElementById("n").value = p.name;
document.getElementById("p1").value = p.p1;
document.getElementById("p2").value = p.p2;
document.getElementById("pm").value = p.pm;
document.getElementById("st").value = p.st;
document.getElementById("im").value = p.img;

document.getElementById("editIdx").value = i;

}

function renderSales(){

document.getElementById("adminSalesList").innerHTML = sales.map((s,i)=>`

<div class="sale-item">

<div>
<b>${s.fecha}</b><br>
${s.cliente || 'Anonimo'}<br>
<small>${s.detalle}</small><br>
<b>${s.total}</b>
</div>

<button onclick="borrarVenta(${i})" style="width:auto; padding:5px; background:red;">
✕
</button>

</div>

`).reverse().join("");

}

function borrarVenta(i){

sales.splice(i,1);
localStorage.setItem("sales", JSON.stringify(sales));
renderSales();

}

function borrarTodoHistorial(){

if(confirm("¿Borrar todo?")){

sales = [];
localStorage.setItem("sales", JSON.stringify(sales));
renderSales();

}

}

function eliminar(i){

products.splice(i,1);

localStorage.setItem("prods", JSON.stringify(products));

renderAdminProds();
render();

}

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("show");

}

function toggleCart(){

document.getElementById("cartDrawer").classList.toggle("active");
document.getElementById("overlay").classList.toggle("show");

}

function closeAll(){

document.querySelectorAll(".active, .show").forEach(el =>
el.classList.remove("active","show")
);

}

render();
updateCart();

</script>
