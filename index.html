<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Online</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --bg:#ffffff;
  --text:#111;
  --card:#f5f5f5;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#111;
    --text:#fff;
    --card:#1e1e1e;
  }
}
body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}
header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#0a84ff;
  color:white;
  align-items:center;
}
.cart-icon{
  cursor:pointer;
  position:relative;
  font-size:22px;
}
.cart-count{
  position:absolute;
  top:-8px;
  right:-10px;
  background:red;
  color:white;
  font-size:12px;
  padding:3px 6px;
  border-radius:50%;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}
.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  text-align:center;
  transition:.3s;
}
.card:hover{
  transform:scale(1.05);
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}
button{
  padding:8px 12px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#0a84ff;
  color:white;
}
.promo{
  color:#00c853;
  font-weight:bold;
}
#cartModal{
  position:fixed;
  top:0;
  right:-100%;
  width:350px;
  height:100%;
  background:var(--bg);
  box-shadow:-5px 0 15px rgba(0,0,0,.3);
  padding:20px;
  transition:.4s;
  overflow:auto;
}
#cartModal.active{
  right:0;
}
.admin-btn{
  position:fixed;
  bottom:15px;
  left:15px;
  width:40px;
  height:40px;
  background:url('https://cdn-icons-png.flaticon.com/512/3524/3524659.png') no-repeat center/cover;
  cursor:pointer;
  opacity:.4;
}
.admin-panel{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:var(--bg);
  padding:20px;
  box-shadow:0 0 15px rgba(0,0,0,.5);
  border-radius:10px;
}
input,select{
  width:100%;
  margin:5px 0;
  padding:5px;
}
</style>
</head>
<body>

<header>
  <h2>Mi Tienda</h2>
  <div class="cart-icon" onclick="toggleCart()">
    🛒
    <span class="cart-count" id="cartCount">0</span>
  </div>
</header>

<div class="grid" id="productos"></div>

<div id="cartModal">
  <h3>Carrito</h3>
  <div id="cartItems"></div>
  <h3 id="total"></h3>
  <button onclick="generarPDF()">Generar Ticket PDF</button>
</div>

<div class="admin-btn" onclick="abrirAdmin()"></div>

<div class="admin-panel" id="adminPanel">
  <h3>Modo Admin</h3>
  <input type="password" id="adminPass" placeholder="Contraseña">
  <button onclick="verificarAdmin()">Entrar</button>

  <div id="adminContent" style="display:none;">
    <input id="nombre" placeholder="Nombre producto">
    <input id="precio" type="number" placeholder="Precio">
    <input id="imagen" placeholder="URL imagen">
    <select id="tipoPromo">
      <option value="">Sin promo</option>
      <option value="3x2">3x2</option>
      <option value="2precio">Llevás 2 pagás menos</option>
    </select>
    <input id="precioEspecial" type="number" placeholder="Precio especial (2precio)">
    <button onclick="agregarProducto()">Agregar</button>
  </div>
</div>

<script>
let productos = [];
let carrito = [];

function renderProductos(){
  let cont = document.getElementById("productos");
  cont.innerHTML="";
  productos.forEach((p,i)=>{
    cont.innerHTML+=`
      <div class="card">
        <img src="${p.imagen}">
        <h4>${p.nombre}</h4>
        <p>$${p.precio}</p>
        ${p.promo ? `<p class="promo">🔥 Promo activa</p>` : ""}
        <button onclick="agregarCarrito(${i})">Agregar</button>
      </div>
    `;
  });
}

function agregarProducto(){
  let nombre=document.getElementById("nombre").value;
  let precio=Number(document.getElementById("precio").value);
  let imagen=document.getElementById("imagen").value;
  let tipo=document.getElementById("tipoPromo").value;
  let precioEspecial=Number(document.getElementById("precioEspecial").value);

  let promo=null;
  if(tipo==="3x2") promo={tipo:"3x2"};
  if(tipo==="2precio") promo={tipo:"2precio",precioEspecial};

  productos.push({nombre,precio,imagen,promo});
  renderProductos();
}

function agregarCarrito(i){
  let item=carrito.find(x=>x.index===i);
  if(item){item.cantidad++}
  else carrito.push({index:i,cantidad:1});
  actualizarCarrito();
}

function calcularTotalProducto(producto,cantidad){
  let total=0;
  let promoTexto="";

  if(!producto.promo){
    total=producto.precio*cantidad;
    return {total,promoTexto};
  }

  if(producto.promo.tipo==="3x2"){
    let grupos=Math.floor(cantidad/3);
    let resto=cantidad%3;
    total=(grupos*2*producto.precio)+(resto*producto.precio);
    if(grupos>0) promoTexto="🔥 Promo 3x2 aplicada";
  }

  if(producto.promo.tipo==="2precio"){
    if(cantidad>=2){
      let pares=Math.floor(cantidad/2);
      let resto=cantidad%2;
      total=(pares*producto.promo.precioEspecial)+(resto*producto.precio);
      promoTexto="🔥 Promo llevando 2 aplicada";
    } else total=producto.precio*cantidad;
  }

  return {total,promoTexto};
}

function actualizarCarrito(){
  let cont=document.getElementById("cartItems");
  cont.innerHTML="";
  let totalGeneral=0;
  let totalCantidad=0;

  carrito.forEach(item=>{
    let p=productos[item.index];
    let res=calcularTotalProducto(p,item.cantidad);
    totalGeneral+=res.total;
    totalCantidad+=item.cantidad;

    cont.innerHTML+=`
      <p>${p.nombre} x${item.cantidad} - $${res.total}</p>
      ${res.promoTexto?`<p class="promo">${res.promoTexto}</p>`:""}
    `;
  });

  document.getElementById("total").innerText="Total: $"+totalGeneral;
  document.getElementById("cartCount").innerText=totalCantidad;
}

function toggleCart(){
  document.getElementById("cartModal").classList.toggle("active");
}

function abrirAdmin(){
  document.getElementById("adminPanel").style.display="block";
}

function verificarAdmin(){
  if(document.getElementById("adminPass").value==="1234"){
    document.getElementById("adminContent").style.display="block";
  } else alert("Contraseña incorrecta");
}

function generarPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text("Ticket de Compra",20,20);
  let y=30;

  carrito.forEach(item=>{
    let p=productos[item.index];
    let res=calcularTotalProducto(p,item.cantidad);
    doc.text(`${p.nombre} x${item.cantidad} - $${res.total}`,20,y);
    y+=10;
  });

  doc.save("ticket.pdf");
}

renderProductos();
</script>

</body>
</html>
