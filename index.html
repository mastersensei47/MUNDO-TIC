<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repuestos PRO</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #2563eb; }
        body { margin:0; font-family: sans-serif; background:var(--bg); color:var(--text); }
        header { display:flex; justify-content:space-between; padding:10px 20px; background:var(--card); align-items:center; }
        .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:15px; padding:20px; }
        .card { background:var(--card); padding:15px; border-radius:12px; text-align:center; }
        .card img { width: 100%; height: 100px; object-fit: contain; }
        .admin-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .admin-content { background: #1e293b; padding: 20px; border-radius: 10px; width: 300px; }
        input { width: 100%; margin: 5px 0; padding: 8px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; padding: 10px; width: 100%; cursor: pointer; margin-top: 5px; border-radius: 5px; }
        .cart-drawer { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: #1e293b; transition: 0.3s; padding: 20px; z-index: 5000; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .cart-drawer.active { right: 0; }
        .badge { background: red; color: white; padding: 2px 6px; border-radius: 50%; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div onclick="location.reload()" style="cursor:pointer; font-weight:bold;">NEO REPUESTOS</div>
    <div style="display:flex; gap:15px; align-items:center;">
        <span onclick="abrirLogin()" style="cursor:pointer">👤 Mayorista</span>
        <span onclick="abrirAdmin()" style="cursor:pointer">🔑 Admin</span>
        <span onclick="toggleCart()" style="cursor:pointer">🛒 <span id="cartCount" class="badge">0</span></span>
    </div>
</header>

<div class="products" id="products"></div>

<div class="admin-modal" id="loginModal">
    <div class="admin-content">
        <h3 style="margin-top:0">Login Mayorista</h3>
        <input id="lEmail" placeholder="Email">
        <input id="lPass" type="password" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
        <button onclick="registrar()" style="background:#444">Registrarse</button>
        <button onclick="cerrarModales()" style="background:none; color:gray">Cerrar</button>
    </div>
</div>

<div class="admin-modal" id="adminModal">
    <div class="admin-content">
        <h3>Nuevo Producto</h3>
        <input id="n" placeholder="Nombre">
        <input id="p1" type="number" placeholder="Precio Normal">
        <input id="pm" type="number" placeholder="Precio Mayorista">
        <input id="img" placeholder="URL Imagen">
        <button onclick="agregarProd()">Guardar</button>
        <button onclick="cerrarModales()" style="background:none; color:gray">Cerrar</button>
    </div>
</div>

<div class="cart-drawer" id="cartDrawer">
    <h3>Tu Carrito</h3>
    <div id="cartList" style="height: 70vh; overflow-y: auto;"></div>
    <hr>
    <div style="display:flex; justify-content:space-between">
        <b>Total:</b> <span id="cartTotal">$0</span>
    </div>
    <button onclick="finalizarPedido()" style="background:#25d366">WhatsApp</button>
    <button onclick="toggleCart()" style="background:none">Cerrar</button>
</div>

<script>
    // 1. CARGA DE DATOS
    let productos = JSON.parse(localStorage.getItem("products")) || [
        {name: "Filtro Aceite", p_ind: 5000, p_may: 3500, img: "https://via.placeholder.com/150"},
        {name: "Bujía Premium", p_ind: 1200, p_may: 800, img: "https://via.placeholder.com/150"}
    ];
    let mayoristas = JSON.parse(localStorage.getItem("mayoristas")) || [];
    let currentUser = JSON.parse(sessionStorage.getItem("currentUser")) || null;
    let carrito = [];

    // 2. FUNCIONES DE INTERFAZ
    function render() {
        const cont = document.getElementById("products");
        cont.innerHTML = "";
        productos.forEach((p, i) => {
            let precio = (currentUser && p.p_may > 0) ? p.p_may : p.p_ind;
            cont.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <h4>${p.name}</h4>
                    <p style="color:#2563eb; font-weight:bold">$${precio} ${currentUser ? '<b>(MAY)</b>' : ''}</p>
                    <button onclick="add(${i})">Agregar</button>
                </div>`;
        });
    }

    function abrirLogin() { document.getElementById("loginModal").style.display = "flex"; }
    function abrirAdmin() { if(prompt("Clave:") === "admin") document.getElementById("adminModal").style.display = "flex"; }
    function cerrarModales() { document.querySelectorAll(".admin-modal").forEach(m => m.style.display="none"); }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); }

    // 3. LÓGICA DE NEGOCIO
    function registrar() {
        const e = document.getElementById("lEmail").value, p = document.getElementById("lPass").value;
        if(!e || !p) return alert("Completa los datos");
        mayoristas.push({email: e, pass: p});
        localStorage.setItem("mayoristas", JSON.stringify(mayoristas));
        alert("Cuenta creada!");
    }

    function login() {
        const e = document.getElementById("lEmail").value, p = document.getElementById("lPass").value;
        const user = mayoristas.find(u => u.email === e && u.pass === p);
        if(user) {
            currentUser = user;
            sessionStorage.setItem("currentUser", JSON.stringify(user));
            cerrarModales();
            render();
            alert("Hola Mayorista!");
        } else alert("Datos incorrectos");
    }

    function agregarProd() {
        const n = document.getElementById("n").value, p1 = document.getElementById("p1").value, pm = document.getElementById("pm").value, img = document.getElementById("img").value;
        productos.push({name: n, p_ind: parseInt(p1), p_may: parseInt(pm), img: img});
        localStorage.setItem("products", JSON.stringify(productos));
        location.reload();
    }

    function add(i) {
        const p = productos[i];
        carrito.push(p);
        actualizarCarrito();
    }

    function actualizarCarrito() {
        const list = document.getElementById("cartList");
        let total = 0;
        list.innerHTML = "";
        carrito.forEach((p, idx) => {
            let precio = (currentUser && p.p_may > 0) ? p.p_may : p.p_ind;
            total += precio;
            list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px">
                <span>${p.name}</span> <span>$${precio}</span>
            </div>`;
        });
        document.getElementById("cartTotal").innerText = "$" + total;
        document.getElementById("cartCount").innerText = carrito.length;
    }

    function finalizarPedido() {
        let msg = "Hola, mi pedido es:\n";
        carrito.forEach(p => msg += `- ${p.name}\n`);
        msg += "Total: " + document.getElementById("cartTotal").innerText;
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
    }

    // Arrancar
    render();
</script>

</body>
</html>
