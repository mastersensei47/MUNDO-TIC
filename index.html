<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Repuestos - Oficial</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --accent: #2563eb; --sidebar-bg: #1e40af;
            --shadow: 0 4px 12px rgba(0,0,0,0.5);
        }
        body.light { --bg: #f4f6f9; --card: #ffffff; --text: #111; --sidebar-bg: #2563eb; }
        body { margin:0; font-family: sans-serif; background:var(--bg); color:var(--text); transition:.3s; }
        
        /* HEADER SLIM (Basado en tu imagen) */
        header { 
            display:flex; justify-content:space-between; align-items:center; 
            padding: 5px 15px; background:var(--card); box-shadow:var(--shadow); 
            position:sticky; top:0; z-index:1000; height: 45px;
        }
        .search-container { flex-grow: 1; max-width: 400px; margin: 0 15px; }
        .search-container input { width: 100%; padding: 6px 12px; border-radius: 15px; border: none; background: rgba(0,0,0,0.2); color: white; font-size: 13px; }

        .icon-group { display: flex; gap: 12px; align-items: center; }
        .icon { cursor:pointer; font-size:18px; position: relative; }
        
        /* SIDEBAR DELGADA */
        .sidebar {
            position: fixed; left: -240px; top: 0; width: 230px; height: 100%;
            background: var(--sidebar-bg); color: white; transition: 0.3s; z-index: 2000;
        }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 12px 20px; color: white; text-decoration: none; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-footer { position: absolute; bottom: 0; width: 100%; background: #ff5e5e; padding: 10px; text-align: center; font-size: 11px; font-weight: bold; }

        /* GRID PRODUCTOS AJUSTADO */
        .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px, 1fr)); gap:15px; padding:15px; }
        .card { background:var(--card); padding:10px; border-radius:10px; text-align:center; box-shadow: var(--shadow); }
        .card img { width: 100%; height: 100px; object-fit: contain; border-radius: 8px; }
        
        .price-tag { font-weight: bold; color: var(--accent); font-size: 1.1em; margin: 5px 0; }
        .promo-tag { color: #059669; font-size: 0.8em; display: block; margin-bottom: 5px; }
        .mayorista-tag { background: #fef3c7; color: #92400e; padding: 2px 5px; border-radius: 4px; font-size: 0.8em; }

        /* MODALES Y ADMIN */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 4000; padding: 15px; }
        .modal-content { background: var(--card); width: 100%; max-width: 450px; border-radius: 12px; padding: 20px; position: relative; max-height: 90vh; overflow-y: auto; }
        
        input { width: 100%; padding: 8px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
        .btn-alt { background: #64748b; margin-top: 10px; }
        .btn-del { background: #ef4444; width: auto; padding: 4px 8px; font-size: 11px; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .overlay.show { display: block; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 8px;">
        <span style="cursor:pointer; font-size: 20px;" onclick="toggleSidebar()">☰</span>
        <div style="font-weight:bold; font-size: 13px;">NEO REPUESTOS</div>
    </div>
    <div class="search-container">
        <input type="text" id="bus" placeholder="Buscar producto..." onkeyup="filtrar()">
    </div>
    <div class="icon-group">
        <span class="icon" onclick="toggleDark()">🌗</span>
        <span class="icon" onclick="document.getElementById('loginModal').style.display='flex'">👤</span>
        <span class="icon" onclick="alert('Funcionalidad de carrito vinculada al botón Agregar')">🛒</span>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<nav class="sidebar" id="sidebar">
    <div style="padding: 15px; font-weight: bold; font-size: 13px;">MENU</div>
    <a href="#" onclick="closeAll()">🏠 Inicio</a>
    <a href="#" onclick="openAdmin()">🔑 Administrador</a>
    <a href="https://instagram.com" target="_blank">📸 Instagram</a>
    <div class="sidebar-footer">¡Quiero una tienda así para mi emprendimiento!</div>
</nav>

<div id="adminPanel" class="modal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer;" onclick="document.getElementById('adminPanel').style.display='none'">✕</span>
        <h3>Gestión de Productos</h3>
        <input type="hidden" id="editIndex">
        <input id="n" placeholder="Nombre (ej: Yerba)">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <input id="p_ind" type="number" placeholder="Precio Ind.">
            <input id="p_x2" type="number" placeholder="Precio x2">
            <input id="p_may" type="number" placeholder="Precio Mayorista">
            <input id="stock" type="number" placeholder="Stock">
        </div>
        <input id="img" placeholder="URL Imagen">
        <button onclick="guardar()" id="btnGuardar">Guardar Producto</button>
        
        <div style="display:flex; gap:5px; margin-top:15px;">
            <button onclick="tab('p')" style="background:#444; font-size:11px">Productos</button>
            <button onclick="tab('h')" style="background:#444; font-size:11px">Ventas</button>
        </div>
        <div id="tab-p" style="margin-top:10px; max-height:200px; overflow-y:auto;"></div>
        <div id="tab-h" style="margin-top:10px; display:none; max-height:200px; overflow-y:auto;"></div>
    </div>
</div>

<div class="products" id="products"></div>

<div class="modal" id="loginModal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer;" onclick="document.getElementById('loginModal').style.display='none'">✕</span>
        <h3 id="modalTitle">Ingreso Mayorista</h3>
        <div id="authInputs">
            <input id="user" placeholder="Usuario">
            <input id="pass" type="password" placeholder="Contraseña">
        </div>
        <div id="loginBtns">
            <button onclick="login()">Entrar</button>
            <p style="text-align:center; font-size:0.8em; cursor:pointer" onclick="toggleAuthMode(true)">¿No tienes cuenta? Regístrate</p>
        </div>
        <div id="registerBtns" style="display:none">
            <button onclick="registrar()" style="background:#9333ea">Crear Cuenta</button>
            <p style="text-align:center; font-size:0.8em; cursor:pointer" onclick="toggleAuthMode(false)">Ya tengo cuenta</p>
        </div>
        <div id="sessionActive" style="display:none">
            <p id="welcomeMsg" style="text-align:center; font-weight:bold"></p>
            <button onclick="logout()" class="btn-del" style="width:100%">Cerrar Sesión</button>
        </div>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem("products")) || [];
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;
    let sales = JSON.parse(localStorage.getItem("sales")) || [];

    function render(lista = products) {
        const container = document.getElementById("products");
        container.innerHTML = "";
        lista.forEach((p, i) => {
            let htmlPrecios = `<div class="price-tag">$${p.p_ind} c/u</div>`;
            if(p.p_x2 > 0) htmlPrecios += `<div class="promo-tag">Llevando 2: $${p.p_x2}</div>`;
            if(currentUser) htmlPrecios += `<div class="mayorista-tag">Mayorista: $${p.p_may}</div>`;

            container.innerHTML += `
                <div class="card">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    <div style="font-size:13px; font-weight:bold; margin:5px 0">${p.name}</div>
                    ${htmlPrecios}
                    <p style="font-size:0.7em">Stock: ${p.stock}</p>
                    <button onclick="comprar('${p.name}', ${currentUser ? p.p_may : p.p_ind})">Agregar</button>
                </div>
            `;
        });
    }

    // --- EL CARRITO DEL PRIMER CÓDIGO (WhatsApp Directo) ---
    function comprar(nombre, precio) {
        let msg = `Hola! Quiero comprar: ${nombre} - Precio: $${precio}`;
        sales.push(`${new Date().toLocaleString()}: ${nombre} ($${precio})`);
        localStorage.setItem("sales", JSON.stringify(sales));
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
    }

    // --- FUNCIONES ADMIN ---
    function openAdmin() {
        if(prompt("Pass:") === "admin") {
            document.getElementById("adminPanel").style.display = "flex";
            cargarAdminList();
        }
    }

    function guardar() {
        let index = document.getElementById("editIndex").value;
        let prod = {
            name: document.getElementById("n").value,
            p_ind: parseInt(document.getElementById("p_ind").value),
            p_x2: parseInt(document.getElementById("p_x2").value) || 0,
            p_may: parseInt(document.getElementById("p_may").value),
            stock: parseInt(document.getElementById("stock").value),
            img: document.getElementById("img").value
        };
        if(index === "") products.push(prod);
        else products[index] = prod;

        localStorage.setItem("products", JSON.stringify(products));
        location.reload();
    }

    function editar(i) {
        let p = products[i];
        document.getElementById("n").value = p.name;
        document.getElementById("p_ind").value = p.p_ind;
        document.getElementById("p_x2").value = p.p_x2;
        document.getElementById("p_may").value = p.p_may;
        document.getElementById("stock").value = p.stock;
        document.getElementById("img").value = p.img;
        document.getElementById("editIndex").value = i;
        document.getElementById("btnGuardar").innerText = "Actualizar Producto";
        tab('p');
    }

    function cargarAdminList() {
        document.getElementById("tab-p").innerHTML = products.map((p, i) => `
            <div style="border-bottom:1px solid #444; padding:5px; display:flex; justify-content:space-between; align-items:center; font-size:12px">
                <span>${p.name}</span>
                <div>
                    <span onclick="editar(${i})" style="color:orange; cursor:pointer; margin-right:10px">Edit</span>
                    <span onclick="eliminar(${i})" style="color:red; cursor:pointer">✕</span>
                </div>
            </div>`).join("");
        
        document.getElementById("tab-h").innerHTML = sales.map(s => `
            <div style="font-size:10px; background:#000; padding:5px; margin-bottom:3px; border-radius:4px">${s}</div>
        `).reverse().join("");
    }

    function eliminar(i) {
        if(confirm("¿Eliminar?")) {
            products.splice(i, 1);
            localStorage.setItem("products", JSON.stringify(products));
            cargarAdminList(); render();
        }
    }

    // --- SISTEMA DE USUARIOS ---
    function toggleAuthMode(isRegister) {
        document.getElementById("modalTitle").innerText = isRegister ? "Registro Mayorista" : "Ingreso Mayorista";
        document.getElementById("loginBtns").style.display = isRegister ? "none" : "block";
        document.getElementById("registerBtns").style.display = isRegister ? "block" : "none";
    }

    function registrar() {
        let u = document.getElementById("user").value, p = document.getElementById("pass").value;
        if(u && p) {
            users.push({user: u, pass: p});
            localStorage.setItem("users", JSON.stringify(users));
            alert("Cuenta creada."); toggleAuthMode(false);
        }
    }

    function login() {
        let u = document.getElementById("user").value, p = document.getElementById("pass").value;
        let found = users.find(x => x.user === u && x.pass === p);
        if(found) {
            localStorage.setItem("currentUser", JSON.stringify(found));
            location.reload();
        } else alert("Error");
    }

    function logout() { localStorage.removeItem("currentUser"); location.reload(); }

    // --- UI ---
    function toggleDark() { document.body.classList.toggle("light"); }
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").classList.toggle("show"); }
    function closeAll() { document.getElementById("sidebar").classList.remove("active"); document.getElementById("overlay").classList.remove("show"); }
    function filtrar() {
        let b = document.getElementById("bus").value.toLowerCase();
        render(products.filter(p => p.name.toLowerCase().includes(b)));
    }
    function tab(t) {
        document.getElementById("tab-p").style.display = t === 'p' ? 'block' : 'none';
        document.getElementById("tab-h").style.display = t === 'h' ? 'block' : 'none';
    }

    if(currentUser) {
        document.getElementById("authInputs").style.display = "none";
        document.getElementById("loginBtns").style.display = "none";
        document.getElementById("sessionActive").style.display = "block";
        document.getElementById("welcomeMsg").innerText = "Bienvenido, " + currentUser.user;
    }

    render();
</script>
</body>
</html>
