<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Tienda Online</title>

<style>
*{box-sizing:border-box;}
body{
  font-family:Arial;
  margin:0;
  background:#f4f4f4;
}

/* HEADER */
header{
  background:#111;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  font-weight:bold;
  font-size:22px;
}

/* BOTON ADMIN OCULTO */
.admin-secret{
  width:28px;
  height:28px;
  background:url('https://cdn-icons-png.flaticon.com/512/1828/1828919.png') no-repeat center;
  background-size:cover;
  cursor:pointer;
  opacity:0.3;
  margin-left:15px;
}

.admin-secret:hover{
  opacity:1;
}

/* CARRITO */
.carrito-icon{
  cursor:pointer;
  font-size:22px;
  position:relative;
}

.carrito-icon span{
  background:red;
  color:white;
  border-radius:50%;
  padding:2px 6px;
  position:absolute;
  top:-8px;
  right:-10px;
  font-size:13px;
}

/* PRODUCTOS */
section{padding:20px;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 0 5px rgba(0,0,0,0.2);
  text-align:center;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:5px;
}

.btn{
  padding:8px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-top:5px;
}

.verde{background:green;color:white;}
.rojo{background:red;color:white;}

/* PANEL CARRITO */
#carritoPanel{
  position:fixed;
  top:0;
  right:-100%;
  width:350px;
  height:100%;
  background:white;
  box-shadow:-3px 0 7px rgba(0,0,0,0.3);
  transition:0.3s ease;
  padding:20px;
  z-index:999;
}

#carritoPanel.open{
  right:0;
}

#envioForm{display:none;margin-top:15px;}

footer{
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  margin-top:20px;
}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;">
    <div class="logo">Mi Tienda</div>
    <div class="admin-secret" onclick="abrirAdmin()"></div>
  </div>

  <div class="carrito-icon" onclick="toggleCarrito()">
    🛒 <span id="contadorCarrito">0</span>
  </div>
</header>

<section>
<h2>Productos</h2>
<div class="grid" id="listaProductos"></div>
</section>

<!-- PANEL CARRITO -->
<div id="carritoPanel">
  <h3>Tu Carrito</h3>
  <div id="listaCarrito"></div>
  <h3>Total: $<span id="totalCarrito">0</span></h3>
  <button class="btn verde" onclick="mostrarEnvio()">Continuar</button>

  <div id="envioForm">
    <h4>Datos</h4>
    <input type="text" id="nombreEnvio" placeholder="Nombre"><br>
    <input type="text" id="direccionEnvio" placeholder="Dirección"><br>
    <input type="text" id="telefonoEnvio" placeholder="Teléfono"><br>
    <button class="btn verde" onclick="enviarPedido()">Enviar por WhatsApp</button>
  </div>
</div>

<footer>© 2026 Mi Tienda</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "TU_APIKEY",
  authDomain: "tienda-online-baaf6.firebaseapp.com",
  projectId: "tienda-online-baaf6",
  storageBucket: "tienda-online-baaf6.firebasestorage.app",
  messagingSenderId: "121093097347",
  appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* VARIABLES */
let carrito=[];

/* CARGAR PRODUCTOS */
async function cargarProductos(){
  const lista=document.getElementById("listaProductos");
  lista.innerHTML="";
  const snapshot=await getDocs(collection(db,"productos"));

  snapshot.forEach(docSnap=>{
    const data=docSnap.data();
    lista.innerHTML+=`
      <div class="card">
        <img src="${data.imagen}">
        <h4>${data.nombre}</h4>
        <p>$${data.precio}</p>
        <button class="btn verde"
          onclick="agregarCarrito('${data.nombre}',${data.precio})">
          Agregar
        </button>
      </div>
    `;
  });
}

/* CARRITO */
window.agregarCarrito=function(nombre,precio){
  carrito.push({nombre,precio});
  actualizarCarritoUI();
}

window.toggleCarrito=function(){
  document.getElementById("carritoPanel").classList.toggle("open");
}

window.mostrarEnvio=function(){
  document.getElementById("envioForm").style.display="block";
}

function actualizarCarritoUI(){
  const lista=document.getElementById("listaCarrito");
  const contador=document.getElementById("contadorCarrito");
  const totalSpan=document.getElementById("totalCarrito");

  lista.innerHTML="";
  let total=0;

  carrito.forEach((item,index)=>{
    total+=item.precio;
    lista.innerHTML+=`
      <div>
        ${item.nombre} - $${item.precio}
        <button class="btn rojo"
          onclick="eliminarCarrito(${index})">
          X
        </button>
      </div>
    `;
  });

  contador.textContent=carrito.length;
  totalSpan.textContent=total;
}

window.eliminarCarrito=function(index){
  carrito.splice(index,1);
  actualizarCarritoUI();
}

/* WHATSAPP */
window.enviarPedido=function(){
  if(carrito.length===0){
    alert("Carrito vacío");
    return;
  }

  let mensaje="Pedido:%0A";
  carrito.forEach(item=>{
    mensaje+=`${item.nombre} - $${item.precio}%0A`;
  });

  window.open(`https://wa.me/549XXXXXXXXXX?text=${mensaje}`,"_blank");
}

/* ADMIN */
window.abrirAdmin=function(){
  const pass=prompt("Contraseña admin:");
  if(pass==="1234"){   // ← CAMBIA ESTA CONTRASEÑA
    const nombre=prompt("Nombre producto:");
    const precio=parseFloat(prompt("Precio:"));
    const imagen=prompt("URL imagen:");

    addDoc(collection(db,"productos"),{
      nombre,precio,imagen
    }).then(()=>{
      alert("Producto agregado");
      cargarProductos();
    });
  }else{
    alert("Contraseña incorrecta");
  }
}

cargarProductos();

</script>
</body>
</html>
