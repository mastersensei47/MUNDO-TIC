<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda PRO</title>

<style>
:root{
--bg:#f3f4f6;
--card:#ffffff;
--text:#111827;
--accent:#2563eb;
--accent2:#9333ea;
--shadow:0 15px 35px rgba(0,0,0,.08);
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--accent:#22d3ee;
--accent2:#f43f5e;
--shadow:0 20px 45px rgba(0,0,0,.6);
}

*{box-sizing:border-box}
body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
transition:.4s;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:var(--card);
box-shadow:var(--shadow);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-weight:700;
font-size:22px;
background:linear-gradient(45deg,var(--accent),var(--accent2));
-webkit-background-clip:text;
color:transparent;
}

.header-icons{
display:flex;
gap:20px;
align-items:center;
}

.icon{
cursor:pointer;
font-size:22px;
position:relative;
}

.cart-count{
position:absolute;
top:-6px;
right:-10px;
background:var(--accent2);
color:#fff;
font-size:11px;
padding:3px 6px;
border-radius:50%;
}

/* PRODUCTOS */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:25px;
padding:30px;
}

.card{
background:var(--card);
border-radius:16px;
box-shadow:var(--shadow);
padding:15px;
transition:.3s;
animation:fade .4s ease;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

.price{
font-weight:700;
font-size:18px;
}

.old{
text-decoration:line-through;
opacity:.6;
margin-left:6px;
font-size:14px;
}

button{
background:linear-gradient(45deg,var(--accent),var(--accent2));
border:none;
color:#fff;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

/* DRAWER */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
z-index:1500;
}

.drawer{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:var(--card);
box-shadow:var(--shadow);
padding:20px;
transition:.4s;
z-index:2000;
overflow:auto;
}

.drawer.open{ right:0; }
.overlay.show{ display:block; }

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.qty{
display:flex;
align-items:center;
gap:5px;
}

.close-btn{
position:absolute;
right:15px;
top:15px;
cursor:pointer;
font-weight:bold;
}

/* ADMIN DASHBOARD */
.admin-login,
.admin-panel{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
z-index:3000;
background:rgba(0,0,0,.5);
}

.admin-box{
background:var(--card);
padding:30px;
border-radius:20px;
width:90%;
max-width:900px;
display:flex;
min-height:500px;
}

.sidebar{
width:200px;
border-right:1px solid #ccc;
padding-right:10px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
}

.admin-content{
flex:1;
padding-left:20px;
overflow:auto;
}

input{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:1px solid #ccc;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header>
<div class="logo">Mi Tienda</div>
<div class="header-icons">
<div class="icon" onclick="toggleDark()">🌗</div>
<div class="icon" onclick="openCart()">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>
<div class="icon" onclick="openAdmin()">●</div>
</div>
</header>

<div class="products" id="products"></div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="drawer" id="drawer">
<div class="close-btn" onclick="closeCart()">✖</div>
<h2>Carrito</h2>
<div id="cartItems"></div>
<hr>
<label><input type="checkbox" id="envioCheck"> Agregar envío</label>
<p>Total: $<span id="total">0</span></p>
<p id="ahorro" style="color:green"></p>
<button onclick="sendWhatsApp()">WhatsApp</button>
</div>

<!-- ADMIN LOGIN -->
<div class="admin-login" id="adminLogin">
<div class="admin-box" style="max-width:400px;">
<div style="width:100%">
<h3>Acceso Admin</h3>
<input id="adminPass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
<div class="admin-box">
<div class="sidebar">
<button onclick="showSection('prod')">📦 Productos</button>
<button onclick="showSection('env')">🚚 Envíos</button>
<button onclick="showSection('hist')">📜 Historial</button>
<button onclick="logout()">Cerrar</button>
</div>

<div class="admin-content" id="adminContent"></div>
</div>
</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[]
let cart=[]
let shipping=localStorage.getItem("shipping")||0

function render(){
let container=document.getElementById("products")
container.innerHTML=""
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image||'https://via.placeholder.com/300'}">
<h3>${p.name}</h3>
<div class="price">$${p.price}</div>
<button onclick="add(${i})">Agregar</button>
</div>`
})
}

function add(i){
let item=cart.find(x=>x.i==i)
if(item)item.qty++
else cart.push({i,qty:1})
updateCart()
}

function updateCart(){
let items=document.getElementById("cartItems")
items.innerHTML=""
let total=0
cart.forEach(c=>{
let p=products[c.i]
total+=p.price*c.qty
items.innerHTML+=`
<div class="cart-item">
<span>${p.name}</span>
<div class="qty">
<button onclick="change(${c.i},-1)">-</button>
${c.qty}
<button onclick="change(${c.i},1)">+</button>
</div>
</div>`
})
if(document.getElementById("envioCheck").checked)
total+=parseInt(shipping)
document.getElementById("total").innerText=total
document.getElementById("cartCount").innerText=cart.reduce((a,b)=>a+b.qty,0)
}

function change(i,v){
let item=cart.find(x=>x.i==i)
item.qty+=v
if(item.qty<=0) cart=cart.filter(x=>x.i!=i)
updateCart()
}

function openCart(){
drawer.classList.add("open")
overlay.classList.add("show")
}
function closeCart(){
drawer.classList.remove("open")
overlay.classList.remove("show")
}

function toggleDark(){
document.body.classList.toggle("dark")
}

function sendWhatsApp(){
let msg="Pedido:%0A"
cart.forEach(c=>{
let p=products[c.i]
msg+=`${p.name} x${c.qty}%0A`
})
window.open(`https://wa.me/549XXXXXXXXXX?text=${msg}`)
}

/* ADMIN */
function openAdmin(){ adminLogin.style.display="flex" }
function login(){
if(adminPass.value==="admin123"){
adminLogin.style.display="none"
adminPanel.style.display="flex"
showSection("prod")
}
}
function logout(){
adminPanel.style.display="none"
}

function showSection(s){
if(s==="prod"){
adminContent.innerHTML=`
<h3>Productos</h3>
<input id="n" placeholder="Nombre">
<input id="p" placeholder="Precio">
<input id="img" placeholder="Imagen URL">
<button onclick="save()">Guardar</button>
<hr>
${products.map((x,i)=>`
<div>
${x.name} - $${x.price}
<button onclick="edit(${i})">Editar</button>
<button onclick="del(${i})">Eliminar</button>
</div>`).join("")}
`
}
if(s==="env"){
adminContent.innerHTML=`
<h3>Envío</h3>
<input id="ship" value="${shipping}">
<button onclick="saveShip()">Guardar</button>`
}
if(s==="hist"){
let h=JSON.parse(localStorage.getItem("hist"))||[]
adminContent.innerHTML="<h3>Historial</h3>"+h.map(x=>`<p>${x}</p>`).join("")
}
}

function save(){
products.push({name:n.value,price:parseInt(p.value),image:img.value})
localStorage.setItem("products",JSON.stringify(products))
render()
showSection("prod")
}

function edit(i){
let x=products[i]
n.value=x.name
p.value=x.price
img.value=x.image
}

function del(i){
products.splice(i,1)
localStorage.setItem("products",JSON.stringify(products))
render()
showSection("prod")
}

function saveShip(){
shipping=ship.value
localStorage.setItem("shipping",shipping)
}

render()
updateCart()
</script>

</body>
</html>
