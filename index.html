<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEO REPUESTOS - Oficial</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--accent:#2563eb;
--sidebar-bg:#1e40af;
--danger:#ef4444;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:5px 20px;
background:var(--card);
position:sticky;
top:0;
z-index:1000;
height:50px;
}

.search-bar input{
padding:6px 15px;
border-radius:20px;
border:1px solid #444;
background:rgba(0,0,0,0.2);
color:white;
width:200px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:var(--sidebar-bg);
transition:.3s;
z-index:2000;
display:flex;
flex-direction:column;
}

.sidebar.active{
left:0;
}

.sidebar a{
padding:15px 20px;
color:white;
text-decoration:none;
}

/* CARRITO */

.cart-drawer{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:var(--card);
transition:.3s;
z-index:3000;
padding:15px;
display:flex;
flex-direction:column;
}

.cart-drawer.active{
right:0;
}

.cart-items{
flex-grow:1;
overflow-y:auto;
font-size:13px;
margin:10px 0;
}

/* PRODUCTOS */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
padding:15px;
}

.card{
background:var(--card);
padding:10px;
border-radius:12px;
text-align:center;
}

.card img{
width:100%;
height:100px;
object-fit:contain;
}

button{
background:var(--accent);
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
width:100%;
}

/* ADMIN */

.admin-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:4000;
}

.admin-content{
background:var(--card);
width:90%;
max-width:500px;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:1px solid #444;
background:#000;
color:white;
}

.product-list-item{
background:rgba(0,0,0,.3);
padding:8px;
border-radius:6px;
margin-bottom:5px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<header>

<span onclick="toggleSidebar()" style="cursor:pointer;font-size:22px;">☰</span>

<div class="search-bar">
<input id="searchInput" placeholder="Buscar..." onkeyup="filtrar()">
</div>

<div style="display:flex;gap:15px;align-items:center">

<span onclick="abrirAdmin()" style="cursor:pointer">🔑</span>

<span onclick="toggleCart()" style="cursor:pointer">
🛒 <span id="cartCount">0</span>
</span>

</div>

</header>

<nav class="sidebar" id="sidebar">

<a onclick="closeAll()">🏠 Inicio</a>

<a onclick="loginMayorista()">💼 Mayorista</a>

<a onclick="alert('NEO REPUESTOS')">ℹ️ Información</a>

</nav>

<div class="cart-drawer" id="cartDrawer">

<h3>Mi Carrito</h3>

<div class="cart-items" id="cartList"></div>

<div style="font-weight:bold;font-size:18px;display:flex;justify-content:space-between;">
<span>Total:</span>
<span id="cartTotal">$0</span>
</div>

<button onclick="enviarPedido()" style="background:#25d366;margin-top:10px;">
Enviar WhatsApp
</button>

</div>

<div class="admin-modal" id="adminModal">

<div class="admin-content">

<h3>Admin Productos</h3>

<input id="n" placeholder="Nombre">

<input id="p1" placeholder="Precio">

<input id="pm" placeholder="Precio mayorista">

<input id="im" placeholder="URL Imagen">

<button onclick="guardar()">Guardar</button>

<div id="adminProdList"></div>

</div>

</div>

<div class="products" id="products"></div>

<script>

let products = JSON.parse(localStorage.getItem("prods")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let cart = [];

let userType = localStorage.getItem("userType") || "cliente";

/* PRODUCTOS DEMO */

if(products.length===0){

products=[

{name:"Azucar",p1:1500,pm:1200,img:"https://i.imgur.com/1z0HqkD.png"},

{name:"Aceite",p1:2500,pm:2000,img:"https://i.imgur.com/eTmWoAN.png"}

];

localStorage.setItem("prods",JSON.stringify(products));

}

/* RENDER */

function render(lista=products){

const container=document.getElementById("products");

container.innerHTML=lista.map((p,i)=>`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<div style="color:var(--accent);font-weight:bold">

$${userType==="mayorista" && p.pm ? p.pm : p.p1}

</div>

<button onclick="add(${i})">Agregar</button>

</div>

`).join("");

}

/* BUSCADOR */

function filtrar(){

let txt=document.getElementById("searchInput").value.toLowerCase();

const filtrados=products.filter(p=>p.name.toLowerCase().includes(txt));

render(filtrados);

}

/* CARRITO */

function add(i){

const item=cart.find(c=>c.id===i);

if(item) item.qty++;
else cart.push({id:i,qty:1});

updateCart();

}

function updateCart(){

let total=0;
let count=0;

document.getElementById("cartList").innerHTML=cart.map((c,idx)=>{

const p=products[c.id];

let price=userType==="mayorista" && p.pm ? p.pm : p.p1;

let sub=c.qty*price;

total+=sub;
count+=c.qty;

return `
<div>
${p.name} x${c.qty} - $${sub}
<span onclick="removeItem(${idx})" style="color:red;cursor:pointer">✕</span>
</div>
`;

}).join("");

document.getElementById("cartTotal").innerText="$"+total;
document.getElementById("cartCount").innerText=count;

}

function removeItem(i){

cart.splice(i,1);
updateCart();

}

/* WHATSAPP */

function enviarPedido(){

if(cart.length===0)return;

let det=cart.map(c=>{

let p=products[c.id];

return `${p.name} x${c.qty}`;

}).join("\n");

let total=document.getElementById("cartTotal").innerText;

let msg=`PEDIDO\n\n${det}\n\nTotal ${total}`;

window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);

cart=[];
updateCart();

}

/* MAYORISTA */

function loginMayorista(){

let clave=prompt("Clave mayorista");

if(clave==="mayo123"){

userType="mayorista";

localStorage.setItem("userType","mayorista");

alert("Modo mayorista activado");

render();

}

}

/* ADMIN */

function abrirAdmin(){

if(prompt("Clave admin")!=="admin")return;

document.getElementById("adminModal").style.display="flex";

renderAdmin();

}

function guardar(){

const p={
name:document.getElementById("n").value,
p1:parseInt(document.getElementById("p1").value),
pm:parseInt(document.getElementById("pm").value),
img:document.getElementById("im").value
};

products.push(p);

localStorage.setItem("prods",JSON.stringify(products));

renderAdmin();
render();

}

function renderAdmin(){

document.getElementById("adminProdList").innerHTML=products.map((p,i)=>`

<div class="product-list-item">

${p.name}

<span onclick="del(${i})" style="color:red;cursor:pointer">Borrar</span>

</div>

`).join("");

}

function del(i){

products.splice(i,1);

localStorage.setItem("prods",JSON.stringify(products));

renderAdmin();
render();

}

/* UI */

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("active");

}

function toggleCart(){

document.getElementById("cartDrawer").classList.toggle("active");

}

function closeAll(){

document.getElementById("sidebar").classList.remove("active");

}

render();

</script>

</body>
</html>
