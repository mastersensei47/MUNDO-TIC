<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repuestos PRO - Firebase & Logística</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #2563eb;
            --sidebar-bg: #1e40af; --success: #10b981; --promo: #f59e0b; --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        body.light { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --sidebar-bg: #2563eb; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; }
        
        header { display:flex; justify-content:space-between; align-items:center; padding:0 20px; background:var(--card); position:sticky; top:0; z-index:1000; height: 60px; box-shadow: var(--shadow); }
        .search-bar { flex-grow: 1; max-width: 400px; margin: 0 20px; }
        .search-bar input { width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid #444; background: rgba(0,0,0,0.1); color: inherit; outline: none; }
        
        .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; padding:20px; }
        .card { background:var(--card); padding:15px; border-radius:15px; text-align:center; position:relative; box-shadow: var(--shadow); transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .card img { width:100%; height:140px; object-fit:contain; margin-bottom: 10px; }
        .promo-tag { position:absolute; top:10px; right:10px; background:var(--promo); color:#000; font-size:10px; font-weight:bold; padding:4px 8px; border-radius:5px; }

        .cart-drawer { position:fixed; right:-380px; top:0; width:350px; height:100%; background:var(--card); transition:0.3s; z-index:3000; padding:20px; display:flex; flex-direction:column; box-shadow: -10px 0 30px rgba(0,0,0,0.5); box-sizing: border-box; overflow-y: auto; }
        .cart-drawer.active { right:0; }
        
        .qty-ctrl { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 8px; }
        .qty-btn { background: var(--accent); color: white; border: none; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; }

        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:4000; padding: 10px; }
        .modal-content { background:var(--card); padding:25px; border-radius:20px; width:100%; max-width:550px; max-height:90vh; overflow-y:auto; position: relative; }
        
        input, select, textarea { width:100%; padding:12px; margin:8px 0; background:rgba(0,0,0,0.2); color:inherit; border:1px solid #444; border-radius:10px; box-sizing:border-box; font-family: inherit; }
        button { cursor:pointer; padding:12px; border-radius:10px; border:none; font-weight:bold; width: 100%; }
        .btn-accent { background: var(--accent); color: white; margin-top: 10px; }
        .btn-wa { background: #25d366; color: white; margin-top: 15px; font-size: 16px; }

        .shipping-box { background: rgba(0,0,0,0.1); padding: 15px; border-radius: 10px; margin-top: 10px; display: none; }
        .user-badge { background: var(--success); color: white; padding: 3px 8px; border-radius: 20px; font-size: 10px; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px">
        <b style="cursor:pointer; font-size: 14px;" onclick="location.reload()">NEO REPUESTOS</b>
    </div>
    <div class="search-bar"><input type="text" id="busqueda" placeholder="Buscar repuesto..." onkeyup="render()"></div>
    <div style="display:flex; gap:15px; align-items:center">
        <span onclick="toggleMode()" style="cursor:pointer">🌗</span>
        <span onclick="abrirModal('loginModal')" id="loginBtn">👤</span>
        <span onclick="abrirAdmin()" style="cursor:pointer">🔑</span>
        <div onclick="toggleCart()" style="cursor:pointer; position:relative">
            🛒 <b id="cartCount" style="position:absolute; top:-10px; right:-10px; background:red; color:white; font-size:10px; padding:2px 6px; border-radius:50%">0</b>
        </div>
    </div>
</header>

<div class="products" id="productsCont"></div>

<div class="cart-drawer" id="cartDrawer">
    <div style="display:flex; justify-content:space-between; align-items:center">
        <h3>Pedido</h3> <span onclick="toggleCart()" style="cursor:pointer; font-size:24px">✕</span>
    </div>
    <div id="cartList" style="flex-grow:1"></div>
    
    <div style="border-top:1px solid #444; padding-top:10px">
        <div id="cartTotal" style="font-size:18px; font-weight:bold">Total: $0</div>
        <div id="ahorro" style="color:var(--success); font-size:12px"></div>
        
        <h4 style="margin: 15px 0 5px;">Entrega:</h4>
        <select id="entregaTipo" onchange="toggleEnvioForm()">
            <option value="retiro">Retiro por Local (Sin costo)</option>
            <option value="envio">Envío a Domicilio</option>
        </select>

        <div id="shippingForm" class="shipping-box">
            <input id="shipName" placeholder="Nombre completo">
            <input id="shipAddr" placeholder="Dirección / Calle y Altura">
            <input id="shipTel" placeholder="Número de contacto">
            <textarea id="shipObs" placeholder="Observaciones (Opcional)"></textarea>
        </div>

        <button class="btn-wa" onclick="enviarPedido()">Confirmar WhatsApp</button>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <span onclick="cerrarModales()" style="float:right; cursor:pointer">✕</span>
        <div style="display:flex; gap:5px; margin-bottom:15px">
            <button onclick="showTab('tab-add')" style="font-size:11px">📦 Nuevo</button>
            <button onclick="showTab('tab-list')" style="font-size:11px">📋 Lista</button>
        </div>

        <div id="tab-add">
            <input type="hidden" id="prodId">
            <input id="n" placeholder="Nombre">
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px">
                <input id="p" type="number" placeholder="Precio Min.">
                <input id="pm" type="number" placeholder="Precio May.">
                <input id="st" type="number" placeholder="Stock">
            </div>
            <select id="promoType" onchange="togglePackInput()">
                <option value="">Sin Promo</option>
                <option value="2x1">2x1</option>
                <option value="3x2">3x2</option>
                <option value="pack">Pack x2</option>
            </select>
            <div id="packPriceCont" style="display:none"><input id="p_pack" type="number" placeholder="Precio si lleva 2"></div>
            <input id="img" placeholder="URL Imagen">
            <button class="btn-accent" onclick="guardarFirebase()">Guardar Producto</button>
        </div>
        <div id="tab-list" style="display:none"><div id="listaAdminCont"></div></div>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:350px">
        <h3 id="userTitle">Login Mayorista</h3>
        <div id="loginForm">
            <input id="logUser" placeholder="Usuario">
            <input id="logPass" type="password" placeholder="Contraseña">
            <button class="btn-accent" onclick="login()">Ingresar</button>
        </div>
        <div id="userInfo" style="display:none">
            <p>Sesión activa como Mayorista.</p>
            <button onclick="logout()" style="background:red; color:white">Cerrar Sesión</button>
        </div>
        <button onclick="cerrarModales()" style="background:none; color:inherit; margin-top:10px">Cerrar</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [];
    let carrito = [];
    let isMayorista = sessionStorage.getItem("isMayorista") === "true";

    // --- FIREBASE SYNC ---
    db.collection("productos").onSnapshot(snap => {
        productos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
        actualizarListaAdmin();
    });

    // --- LOGICA PRECIOS ---
    function getPrecioVenta(p) {
        return (isMayorista && p.precio_may > 0) ? p.precio_may : p.precio;
    }

    function calcularSubtotal(p, qty) {
        let precio = getPrecioVenta(p);
        if (p.promoType === "2x1") return Math.ceil(qty / 2) * precio;
        if (p.promoType === "3x2") return (Math.floor(qty / 3) * 2 + (qty % 3)) * precio;
        if (p.promoType === "pack" && qty >= 2) return Math.floor(qty / 2) * p.p_pack + (qty % 2 * precio);
        return qty * precio;
    }

    // --- UI RENDER ---
    function render() {
        const busq = document.getElementById("busqueda").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        cont.innerHTML = productos.filter(p => p.nombre.toLowerCase().includes(busq)).map(p => {
            let p_final = getPrecioVenta(p);
            return `
            <div class="card">
                ${p.promoType ? `<div class="promo-tag">${p.promoType.toUpperCase()}</div>` : ''}
                <img src="${p.imagen || 'https://via.placeholder.com/150'}">
                ${isMayorista ? '<div class="user-badge">PRECIO VIP</div>' : ''}
                <h4>${p.nombre}</h4>
                <p style="font-weight:bold; color:var(--accent)">$${p_final}</p>
                <small>Stock: ${p.stock}</small>
                <button class="btn-accent" onclick="addCart('${p.id}')" ${p.stock <= 0 ? 'disabled style="background:gray"' : ''}>
                    ${p.stock > 0 ? 'Agregar' : 'Sin Stock'}
                </button>
            </div>`;
        }).join("");
        actualizarEstadoUser();
    }

    function addCart(id) {
        const p = productos.find(x => x.id === id);
        const item = carrito.find(c => c.id === id);
        if(item) { if(item.qty < p.stock) item.qty++; } 
        else { carrito.push({id, qty: 1}); }
        updateCartUI();
    }

    function updateCartUI() {
        const list = document.getElementById("cartList");
        let total = 0; let ahorro = 0;
        list.innerHTML = carrito.map((c, i) => {
            const p = productos.find(x => x.id === c.id);
            const sub = calcularSubtotal(p, c.qty);
            total += sub; 
            ahorro += (getPrecioVenta(p) * c.qty - sub);
            return `
            <div style="display:flex; justify-content:space-between; align-items:center; margin:10px 0">
                <div><b>${p.nombre}</b><br>$${sub}</div>
                <div class="qty-ctrl">
                    <button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
                    <span>${c.qty}</span>
                    <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
                </div>
            </div>`;
        }).join("");
        document.getElementById("cartTotal").innerText = "Total: $" + total;
        document.getElementById("ahorro").innerText = ahorro > 0 ? `¡Ahorro Promo: $${ahorro}!` : "";
        document.getElementById("cartCount").innerText = carrito.reduce((a,b) => a + b.qty, 0);
    }

    function changeQty(i, d) {
        const p = productos.find(x => x.id === carrito[i].id);
        if(d > 0 && carrito[i].qty >= p.stock) return;
        carrito[i].qty += d;
        if(carrito[i].qty <= 0) carrito.splice(i, 1);
        updateCartUI();
    }

    // --- LOGIN / LOGISTICA ---
    function login() {
        if(document.getElementById("logUser").value === "mayorista" && document.getElementById("logPass").value === "vip") {
            isMayorista = true; sessionStorage.setItem("isMayorista", "true");
            cerrarModales(); render();
        } else { alert("Datos incorrectos"); }
    }
    function logout() { isMayorista = false; sessionStorage.setItem("isMayorista", "false"); cerrarModales(); render(); }
    function actualizarEstadoUser() {
        document.getElementById("loginBtn").style.color = isMayorista ? "var(--success)" : "inherit";
        document.getElementById("loginForm").style.display = isMayorista ? "none" : "block";
        document.getElementById("userInfo").style.display = isMayorista ? "block" : "none";
    }

    function toggleEnvioForm() {
        document.getElementById("shippingForm").style.display = document.getElementById("entregaTipo").value === "envio" ? "block" : "none";
    }

    async function enviarPedido() {
        if(carrito.length === 0) return;
        let tipo = document.getElementById("entregaTipo").value;
        let msg = `*NUEVO PEDIDO NEO REPUESTOS*\n`;
        msg += isMayorista ? `_Cliente: Mayorista_\n\n` : `_Cliente: Minorista_\n\n`;
        
        for(let c of carrito) {
            const p = productos.find(x => x.id === c.id);
            msg += `• ${p.nombre} x${c.qty} = $${calcularSubtotal(p, c.qty)}\n`;
            await db.collection("productos").doc(p.id).update({ stock: p.stock - c.qty });
        }
        
        msg += `\n*TOTAL: ${document.getElementById("cartTotal").innerText}*`;
        
        if(tipo === "envio") {
            msg += `\n\n*DATOS DE ENVÍO:*`;
            msg += `\nNombre: ${document.getElementById("shipName").value}`;
            msg += `\nDirección: ${document.getElementById("shipAddr").value}`;
            msg += `\nTel: ${document.getElementById("shipTel").value}`;
            msg += `\nObs: ${document.getElementById("shipObs").value}`;
        } else { msg += `\n\n*RETIRO POR LOCAL*`; }

        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
        carrito = []; updateCartUI();
    }

    // --- ADMIN HELPERS ---
    async function guardarFirebase() {
        const id = document.getElementById("prodId").value;
        const data = {
            nombre: document.getElementById("n").value,
            precio: Number(document.getElementById("p").value),
            precio_may: Number(document.getElementById("pm").value),
            stock: Number(document.getElementById("st").value),
            promoType: document.getElementById("promoType").value,
            p_pack: Number(document.getElementById("p_pack").value) || 0,
            imagen: document.getElementById("img").value
        };
        if(id) await db.collection("productos").doc(id).update(data);
        else await db.collection("productos").add(data);
        limpiarForm();
    }

    function actualizarListaAdmin() {
        document.getElementById("listaAdminCont").innerHTML = productos.map(p => `
        <div style="display:flex; justify-content:space-between; font-size:11px; padding:5px; border-bottom:1px solid #444">
            <span>${p.nombre} (St: ${p.stock})</span>
            <button onclick="editarProd('${p.id}')" style="width:auto; background:orange; padding:2px 5px">✏️</button>
        </div>`).join("");
    }

    function editarProd(id) {
        const p = productos.find(x => x.id === id);
        document.getElementById("prodId").value = p.id;
        document.getElementById("n").value = p.nombre;
        document.getElementById("p").value = p.precio;
        document.getElementById("pm").value = p.precio_may;
        document.getElementById("st").value = p.stock;
        document.getElementById("promoType").value = p.promoType || "";
        document.getElementById("p_pack").value = p.p_pack;
        togglePackInput(); showTab('tab-add');
    }

    function toggleMode() { document.body.classList.toggle("light"); }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); }
    function abrirModal(id) { document.getElementById(id).style.display = "flex"; }
    function cerrarModales() { document.querySelectorAll(".modal").forEach(m => m.style.display="none"); }
    function abrirAdmin() { if(prompt("Clave:") === "admin") abrirModal("adminModal"); }
    function showTab(t) { document.getElementById("tab-add").style.display = t==='tab-add'?'block':'none'; document.getElementById("tab-list").style.display = t==='tab-list'?'block':'none'; }
    function togglePackInput() { document.getElementById("packPriceCont").style.display = document.getElementById("promoType").value === "pack" ? "block" : "none"; }
    function limpiarForm() { document.getElementById("prodId").value=""; document.getElementById("n").value=""; document.getElementById("p").value=""; document.getElementById("pm").value=""; document.getElementById("st").value=""; document.getElementById("img").value=""; }
</script>
</body>
</html>
