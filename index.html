<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEO REPUESTOS - Oficial</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--accent:#2563eb;
--sidebar:#1e40af;
--danger:#ef4444;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
background:var(--card);
padding:8px 20px;
position:sticky;
top:0;
z-index:1000;
}

.search-bar input{
padding:6px 15px;
border-radius:20px;
border:none;
background:#000;
color:white;
width:200px;
}

.mode{
font-size:12px;
color:#aaa;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-260px;
top:0;
width:240px;
height:100%;
background:var(--sidebar);
transition:.3s;
z-index:2000;
}

.sidebar.active{left:0;}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
}

/* PRODUCTOS */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
padding:15px;
}

.card{
background:var(--card);
padding:10px;
border-radius:12px;
text-align:center;
}

.card img{
width:100%;
height:100px;
object-fit:contain;
}

/* CARRITO */

.cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:var(--card);
transition:.3s;
z-index:3000;
padding:15px;
display:flex;
flex-direction:column;
}

.cart.active{right:0;}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
font-size:13px;
}

.qty{
display:flex;
gap:5px;
align-items:center;
}

.qty button{
width:25px;
height:25px;
padding:0;
}

button{
background:var(--accent);
border:none;
color:white;
padding:8px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<span onclick="toggleSidebar()" style="cursor:pointer;font-size:22px;">☰</span>

<div class="search-bar">
<input id="searchInput" placeholder="Buscar..." onkeyup="filtrar()">
</div>

<div>
<span id="modeLabel" class="mode">Cliente</span>
<span onclick="toggleCart()" style="cursor:pointer;margin-left:10px;">🛒<span id="cartCount">0</span></span>
</div>

</header>

<!-- SIDEBAR -->

<nav class="sidebar" id="sidebar">

<a href="#">🏠 Inicio</a>

<a onclick="loginMayorista()">💼 Mayorista</a>

<a href="https://instagram.com" target="_blank">📸 Instagram</a>

</nav>

<!-- CARRITO -->

<div class="cart" id="cartDrawer">

<h3>Mi carrito</h3>

<div id="cartList" style="flex:1;overflow:auto;"></div>

<div style="font-size:18px;font-weight:bold;">
Total: <span id="cartTotal">$0</span>
</div>

<button onclick="enviarPedido()" style="margin-top:10px;background:#25d366;">
Confirmar WhatsApp
</button>

</div>

<!-- PRODUCTOS -->

<div class="products" id="products"></div>

<script>

/* DATOS */

let products = JSON.parse(localStorage.getItem("prods")) || [];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let userType = localStorage.getItem("userType") || "cliente";

document.getElementById("modeLabel").innerText =
userType === "mayorista" ? "Mayorista" : "Cliente";

/* RENDER PRODUCTOS */

function render(){

const search = document.getElementById("searchInput").value.toLowerCase();

const container=document.getElementById("products");

container.innerHTML = products
.filter(p=>p.name.toLowerCase().includes(search))
.map((p,i)=>{

let precio = userType==="mayorista" && p.pm ? p.pm : p.p1;

return `

<div class="card">

<img src="${p.img || 'https://via.placeholder.com/150'}">

<h4>${p.name}</h4>

<div style="color:var(--accent);font-weight:bold;">
$${precio}
</div>

<button onclick="add(${i})">Agregar</button>

</div>

`;

}).join("");

}

/* BUSCADOR */

function filtrar(){
render();
}

/* CARRITO */

function add(i){

const item = cart.find(c=>c.id===i);

if(item) item.qty++;
else cart.push({id:i,qty:1});

updateCart();

}

function updateCart(){

let total=0;
let count=0;

document.getElementById("cartList").innerHTML = cart.map((c,idx)=>{

const p = products[c.id];

let precio = userType==="mayorista" && p.pm ? p.pm : p.p1;

let sub = precio*c.qty;

total += sub;
count += c.qty;

return`

<div class="cart-item">

<div>
<b>${p.name}</b><br>
$${sub}
</div>

<div class="qty">

<button onclick="cart[${idx}].qty--;if(cart[${idx}].qty<=0)cart.splice(${idx},1);updateCart()">-</button>

<span>${c.qty}</span>

<button onclick="cart[${idx}].qty++;updateCart()">+</button>

</div>

</div>

`;

}).join("");

document.getElementById("cartTotal").innerText="$"+total;
document.getElementById("cartCount").innerText=count;

localStorage.setItem("cart",JSON.stringify(cart));

}

/* LOGIN MAYORISTA */

function loginMayorista(){

let clave=prompt("Clave mayorista");

if(clave==="mayo123"){

userType="mayorista";

localStorage.setItem("userType","mayorista");

alert("Modo mayorista activado");

render();
updateCart();

}

}

/* WHATSAPP */

function enviarPedido(){

if(cart.length===0)return;

let detalle=cart.map(c=>{

let p=products[c.id];

return `- ${p.name} x${c.qty}`;

}).join("\n");

let total=document.getElementById("cartTotal").innerText;

let msg=`PEDIDO\n\n${detalle}\n\nTOTAL ${total}`;

window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);

}

/* UI */

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

function toggleCart(){
document.getElementById("cartDrawer").classList.toggle("active");
}

/* INICIO */

render();
updateCart();

</script>

</body>
</html>
