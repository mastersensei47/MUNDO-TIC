<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda con Precios Especiales</title>
    <style>
        :root{ --bg:#f4f6f9; --card:#ffffff; --text:#111; --accent:#2563eb; --accent2:#9333ea; --shadow:0 10px 30px rgba(0,0,0,.1); }
        body.dark{ --bg:#0f172a; --card:#1e293b; --text:#f1f5f9; }
        body{ margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); transition:.3s; }
        
        header{ display:flex; justify-content:space-between; align-items:center; padding:15px 25px; background:var(--card); box-shadow:var(--shadow); position:sticky; top:0; z-index:1000; }
        .icon{ cursor:pointer; font-size:22px; margin-left:15px; }
        
        .products{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; padding:25px; }
        .card{ background:var(--card); padding:15px; border-radius:15px; box-shadow:var(--shadow); text-align:center; }
        .card img{ width:100%; height:150px; object-fit:contain; border-radius:10px; }
        
        .price-tag { font-weight: bold; color: var(--accent); font-size: 1.1em; }
        .promo-tag { color: #059669; font-size: 0.9em; display: block; margin: 5px 0; }
        .mayorista-tag { background: #fef3c7; color: #92400e; padding: 2px 5px; border-radius: 4px; font-size: 0.8em; }

        /* Modales y Paneles */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; justify-content: center; align-items: center; z-index: 5000; overflow-y: auto; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; position: relative; }
        
        #adminPanel { background: var(--bg); display: none; padding: 20px; border: 2px solid var(--accent); margin: 20px; border-radius: 15px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-alt { background: #64748b; }
        .btn-del { background: #ef4444; width: auto; padding: 5px 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold">MI TIENDA</div>
    <div>
        <span class="icon" onclick="openAdmin()">🔑</span>
        <span class="icon" onclick="document.getElementById('loginModal').style.display='flex'">👤</span>
        <span class="icon" onclick="toggleDark()">🌗</span>
    </div>
</header>

<div id="adminPanel">
    <h3>Gestión de Productos</h3>
    <input type="hidden" id="editIndex">
    <input id="n" placeholder="Nombre (ej: Yerba)">
    <input id="p_ind" type="number" placeholder="Precio Individual">
    <input id="p_x2" type="number" placeholder="Precio x2 Unidades">
    <input id="p_may" type="number" placeholder="Precio Mayorista">
    <input id="stock" type="number" placeholder="Stock">
    <input id="img" placeholder="URL Imagen">
    <button onclick="guardar()">Guardar Producto</button>
    <div id="listaAdmin" style="margin-top:20px"></div>
    <button class="btn-alt" onclick="document.getElementById('adminPanel').style.display='none'">Cerrar Admin</button>
</div>

<div class="products" id="products"></div>

<div class="modal" id="loginModal">
    <div class="modal-content">
        <h3 id="modalTitle">Ingreso Mayorista</h3>
        <input id="user" placeholder="Usuario">
        <input id="pass" type="password" placeholder="Contraseña">
        
        <div id="loginBtns">
            <button onclick="login()">Entrar</button>
            <p style="text-align:center; font-size:0.8em; cursor:pointer" onclick="toggleAuthMode(true)">¿No tienes cuenta? Regístrate</p>
        </div>
        
        <div id="registerBtns" style="display:none">
            <button onclick="registrar()" style="background:var(--accent2)">Crear Cuenta</button>
            <p style="text-align:center; font-size:0.8em; cursor:pointer" onclick="toggleAuthMode(false)">Ya tengo cuenta</p>
        </div>
        
        <button class="btn-alt" onclick="logout()" id="btnLogout" style="display:none">Cerrar Sesión</button>
        <button class="btn-alt" onclick="this.parentElement.parentElement.style.display='none'">Cancelar</button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem("products")) || [];
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;

    function render() {
        const container = document.getElementById("products");
        container.innerHTML = "";

        products.forEach((p, i) => {
            // Lógica de visualización de precios
            let htmlPrecios = `<div class="price-tag">$${p.p_ind} c/u</div>`;
            
            if(p.p_x2 > 0) {
                htmlPrecios += `<div class="promo-tag">Llevando 2: $${p.p_x2} ($${p.p_x2/2} c/u)</div>`;
            }

            if(currentUser) {
                htmlPrecios += `<div class="mayorista-tag">Precio Mayorista: $${p.p_may}</div>`;
            }

            container.innerHTML += `
                <div class="card">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    <h4>${p.name}</h4>
                    ${htmlPrecios}
                    <p style="font-size:0.8em">Stock: ${p.stock}</p>
                    <button onclick="alert('Añadido al carrito')">Agregar</button>
                </div>
            `;
        });
    }

    // --- FUNCIONES ADMIN ---
    function openAdmin() {
        if(prompt("Pass:") === "admin") {
            document.getElementById("adminPanel").style.display = "block";
            cargarAdmin();
        }
    }

    function guardar() {
        let index = document.getElementById("editIndex").value;
        let prod = {
            name: document.getElementById("n").value,
            p_ind: parseInt(document.getElementById("p_ind").value),
            p_x2: parseInt(document.getElementById("p_x2").value) || 0,
            p_may: parseInt(document.getElementById("p_may").value),
            stock: parseInt(document.getElementById("stock").value),
            img: document.getElementById("img").value
        };

        if(index === "") products.push(prod);
        else products[index] = prod;

        localStorage.setItem("products", JSON.stringify(products));
        render();
        cargarAdmin();
        document.getElementById("editIndex").value = "";
    }

    function cargarAdmin() {
        let l = document.getElementById("listaAdmin");
        l.innerHTML = products.map((p, i) => `
            <div style="border-bottom:1px solid #ccc; padding:5px">
                ${p.name} 
                <button class="btn-del" onclick="eliminar(${i})">Eliminar</button>
            </div>
        `).join("");
    }

    function eliminar(i) {
        products.splice(i, 1);
        localStorage.setItem("products", JSON.stringify(products));
        render(); cargarAdmin();
    }

    // --- SISTEMA DE USUARIOS ---
    function toggleAuthMode(isRegister) {
        document.getElementById("modalTitle").innerText = isRegister ? "Registro Mayorista" : "Ingreso Mayorista";
        document.getElementById("loginBtns").style.display = isRegister ? "none" : "block";
        document.getElementById("registerBtns").style.display = isRegister ? "block" : "none";
    }

    function registrar() {
        let u = document.getElementById("user").value;
        let p = document.getElementById("pass").value;
        if(u && p) {
            users.push({user: u, pass: p});
            localStorage.setItem("users", JSON.stringify(users));
            alert("Cuenta creada con éxito. Ahora inicia sesión.");
            toggleAuthMode(false);
        }
    }

    function login() {
        let u = document.getElementById("user").value;
        let p = document.getElementById("pass").value;
        let found = users.find(x => x.user === u && x.pass === p);
        if(found) {
            currentUser = found;
            localStorage.setItem("currentUser", JSON.stringify(found));
            location.reload(); // Recargar para mostrar precios
        } else alert("Datos incorrectos");
    }

    function logout() {
        localStorage.removeItem("currentUser");
        location.reload();
    }

    function toggleDark() { document.body.classList.toggle("dark"); }

    // Verificar si hay sesión activa al cargar
    if(currentUser) {
        document.getElementById("loginBtns").style.display = "none";
        document.getElementById("btnLogout").style.display = "block";
        document.getElementById("modalTitle").innerText = "Bienvenido, " + currentUser.user;
    }

    render();
</script>
</body>
</html>
