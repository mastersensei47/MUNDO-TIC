<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO REPUESTOS - PREMIUM EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
            --input-bg: rgba(30, 41, 59, 0.7);
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --input-bg: #f1f5f9;
        }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; background: var(--card); position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-icons { display: flex; gap: 20px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 22px; transition: 0.2s; position: relative; }

        /* --- NUEVO DISEÑO DE PRODUCTO --- */
        .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:25px; padding:25px; }
        .product-card { 
            background: var(--card); border-radius: 24px; overflow: hidden;
            border: 1px solid rgba(128,128,128,0.1); transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .img-container { background: white; padding: 20px; position: relative; height: 160px; display: flex; align-items: center; justify-content: center; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .promo-tag { 
            position: absolute; top: 12px; left: 12px; background: var(--promo); 
            color: #000; font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 50px; 
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4);
        }

        .product-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-info h4 { margin: 0; font-size: 16px; font-weight: 600; line-height: 1.4; opacity: 0.9; }
        .price-tag { margin: 15px 0; font-size: 22px; font-weight: 800; color: var(--accent); }
        .price-label { font-size: 10px; text-transform: uppercase; opacity: 0.5; display: block; margin-bottom: 2px; }

        /* --- NUEVO DISEÑO DE CARRITO --- */
        #cartDrawer { 
            position: fixed; right: -450px; top: 0; width: 380px; height: 100%; 
            background: var(--card); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
            z-index: 3000; padding: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column;
        }
        #cartDrawer.active { right: 0; }
        .cart-header { padding: 30px; border-bottom: 1px solid rgba(128,128,128,0.1); display: flex; justify-content: space-between; align-items: center; }
        .cart-body { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .cart-footer { padding: 30px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(128,128,128,0.1); }

        .cart-item { 
            display: flex; gap: 15px; margin-bottom: 20px; padding-bottom: 20px; 
            border-bottom: 1px solid rgba(128,128,128,0.05); align-items: center;
        }
        .cart-item-img { width: 60px; height: 60px; background: white; border-radius: 12px; padding: 5px; }
        .cart-item-img img { width: 100%; height: 100%; object-fit: contain; }
        .cart-item-info { flex-grow: 1; }
        .cart-item-info b { font-size: 14px; display: block; margin-bottom: 4px; }
        .cart-qty-controls { display: flex; align-items: center; gap: 10px; background: rgba(128,128,128,0.1); border-radius: 8px; padding: 5px 10px; width: fit-content; }
        .cart-qty-controls button { background: none; border: none; color: inherit; cursor: pointer; font-weight: bold; font-size: 16px; }

        /* GENERAL */
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; font-size: 14px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { filter: brightness(1.2); }
        .btn-whatsapp { background: #25d366; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 4000; }
        .modal-content { background: var(--card); padding: 35px; border-radius: 30px; width: 90%; max-width: 500px; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 2000; }
        .overlay.active { display: block; }
        .qty-badge { position: absolute; top: -5px; right: -8px; background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: var(--input-bg); color: inherit; border: 1px solid rgba(128,128,128,0.2); border-radius: 12px; }
    </style>
</head>
<body>

<header>
    <b style="font-size:24px; letter-spacing:-1px" onclick="location.reload()">NEO<span style="color:var(--accent)">REPUESTOS</span></b>
    <div class="header-icons">
        <span class="icon-btn" onclick="toggleTheme()">🌗</span>
        <span class="icon-btn" onclick="abrirModal('loginModal')">👤</span>
        <span class="icon-btn" onclick="verificarAdmin()">⚙️</span>
        <div class="icon-btn" onclick="toggleCart()">🛒 <b id="cartCount" class="qty-badge">0</b></div>
    </div>
</header>

<div class="overlay" id="mainOverlay" onclick="closeAll()"></div>

<div class="products-grid" id="productsCont"></div>

<div id="cartDrawer">
    <div class="cart-header">
        <h2 style="margin:0">Mi Pedido</h2>
        <span onclick="toggleCart()" style="cursor:pointer; font-size:24px">✕</span>
    </div>
    <div class="cart-body" id="cartItemsList">
        </div>
    <div class="cart-footer">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:18px">
            <span style="opacity:0.6">Total a pagar</span>
            <b id="cartTotalText">$0</b>
        </div>
        <button class="btn btn-whatsapp" onclick="enviarWhatsApp()">
            FINALIZAR POR WHATSAPP
        </button>
        <button class="btn" style="background:none; margin-top:10px" onclick="toggleCart()">Seguir navegando</button>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2>Acceso Clientes</h2>
        <input id="userInp" placeholder="Usuario">
        <input id="passInp" type="password" placeholder="Contraseña">
        <button class="btn btn-primary" onclick="checkLogin()">INGRESAR</button>
        <button class="btn" style="background:none; margin-top:10px" onclick="closeAll()">← Volver</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [];
    let carrito = [];
    let esMayorista = localStorage.getItem("neo_may") === "true";

    db.collection("productos").onSnapshot(snap => {
        productos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
    });

    function render() {
        const cont = document.getElementById("productsCont");
        cont.innerHTML = productos.map(p => `
            <div class="product-card">
                <div class="img-container">
                    ${p.promo ? `<div class="promo-tag">${p.promo}</div>` : ''}
                    <img src="${p.imagen || 'https://via.placeholder.com/150'}">
                </div>
                <div class="product-info">
                    <div>
                        <span class="price-label">Repuesto</span>
                        <h4>${p.nombre}</h4>
                    </div>
                    <div>
                        <div class="price-tag">$${esMayorista ? p.precio_may : p.precio}</div>
                        <button class="btn btn-primary" onclick="addToCart('${p.id}')">AÑADIR AL CARRITO</button>
                    </div>
                </div>
            </div>`).join("");
    }

    function addToCart(id) {
        const exist = carrito.find(c => c.id === id);
        if(exist) exist.qty++; else carrito.push({id, qty:1});
        updateCartUI();
        if(!document.getElementById("cartDrawer").classList.contains("active")) toggleCart();
    }

    function modQty(id, n) {
        const item = carrito.find(c => c.id === id);
        if(item) {
            item.qty += n;
            if(item.qty <= 0) carrito = carrito.filter(c => c.id !== id);
        }
        updateCartUI();
    }

    function updateCartUI() {
        let total = 0;
        document.getElementById("cartCount").innerText = carrito.reduce((a,b)=>a+b.qty, 0);
        const list = document.getElementById("cartItemsList");
        
        if(carrito.length === 0) {
            list.innerHTML = `<div style="text-align:center; margin-top:50px; opacity:0.5">El carrito está vacío</div>`;
        } else {
            list.innerHTML = carrito.map(c => {
                const p = productos.find(x => x.id === c.id);
                const sub = (esMayorista ? p.precio_may : p.precio) * c.qty;
                total += sub;
                return `
                <div class="cart-item">
                    <div class="cart-item-img"><img src="${p.imagen}"></div>
                    <div class="cart-item-info">
                        <b>${p.nombre}</b>
                        <span style="color:var(--accent); font-weight:700">$${sub}</span>
                    </div>
                    <div class="cart-qty-controls">
                        <button onclick="modQty('${p.id}',-1)">-</button>
                        <span>${c.qty}</span>
                        <button onclick="modQty('${p.id}',1)">+</button>
                    </div>
                </div>`;
            }).join("");
        }
        document.getElementById("cartTotalText").innerText = "$" + total;
    }

    function enviarWhatsApp() {
        let msg = "*NUEVO PEDIDO NEO*\n\n";
        carrito.forEach(c => {
            const p = productos.find(x => x.id === c.id);
            msg += `• ${p.nombre} (x${c.qty})\n`;
        });
        msg += `\n*TOTAL: ${document.getElementById("cartTotalText").innerText}*`;
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
    }

    // UI Lógica
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function closeAll() { document.querySelectorAll(".modal").forEach(m => m.style.display = "none"); document.getElementById("cartDrawer").classList.remove("active"); document.getElementById("mainOverlay").classList.remove("active"); }
    function abrirModal(id) { document.getElementById(id).style.display = "flex"; }
    function toggleTheme() { document.body.classList.toggle("light"); }
    function checkLogin() { if(document.getElementById("userInp").value === "mayorista") { esMayorista=true; localStorage.setItem("neo_may", "true"); closeAll(); render(); } }
    function verificarAdmin() { if(prompt("Clave:") === "admin") alert("Panel Admin abierto"); }
</script>
</body>
</html>
