<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS47 - SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
            --input-bg: rgba(30, 41, 59, 0.7);
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --input-bg: #f1f5f9;
        }
        
        /* Correcciones Base */
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; overflow-x: hidden; }
        * { box-sizing: border-box; }

        /* HEADER OPTIMIZADO */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; background: var(--card); position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); border-bottom: 1px solid rgba(128,128,128,0.1);
            height: 90px; 
        }
        
        .header-left { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        
        /* Logo del Header: Más grande y centrado verticalmente */
        .main-logo {
            height: 70px; 
            width: auto; 
            cursor: pointer;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); 
            transition: transform 0.3s;
        }
        .main-logo:hover { transform: scale(1.05); }

        .search-container { flex-grow: 1; max-width: 600px; margin: 0 20px; }
        .search-bar { 
            width: 100%; padding: 12px 20px; border-radius: 12px; border: none; 
            background: var(--input-bg); color: var(--text); font-size: 14px;
        }

        .header-icons { display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
        .icon-btn { cursor: pointer; font-size: 22px; position: relative; display: flex; align-items: center; }

        /* GRID DE PRODUCTOS */
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; padding: 25px; 
        }

        /* DRAWERS (PANELES LATERALES) - Corrección de Scroll */
        .drawer { 
            position: fixed; top: 0; width: 85%; max-width: 320px; height: 100%; 
            background: var(--card); transition: 0.4s; z-index: 3000; 
            display: flex; flex-direction: column; overflow: hidden; /* Evita scroll doble */
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        #infoDrawer { left: -100%; }
        #infoDrawer.active { left: 0; }
        #cartDrawer { right: -100%; }
        #cartDrawer.active { right: 0; }

        .drawer-content {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto; /* Scroll solo aquí dentro */
            scrollbar-width: none; /* Firefox */
        }
        .drawer-content::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        /* Elementos del Panel Lateral */
        .map-container { width: 100%; border-radius: 15px; overflow: hidden; margin: 15px 0; height: 160px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Logo Inferior del Menú: Gigante y sin texto extra */
        .footer-logo-container {
            text-align: center; padding: 20px; border-top: 1px solid rgba(128,128,128,0.1); background: var(--card);
        }
        .footer-logo { width: 100%; max-width: 250px; height: auto; border-radius: 12px; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.5)); }

        /* PRODUCT CARDS */
        .product-card { 
            background: var(--card); border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(128,128,128,0.1); transition: 0.3s; 
            display: flex; flex-direction: column; 
        }
        .img-box { background: #fff; height: 160px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info-box { padding: 15px; flex-grow: 1; }
        .price-val { font-size: 22px; font-weight: 900; color: var(--accent); }

        /* MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 4000; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); }

        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; font-size: 14px; text-transform: uppercase; }
        .btn-primary { background: var(--accent); color: white; }
        
        .qty-badge { position: absolute; top: -8px; right: -10px; background: var(--danger); color: white; font-size: 11px; padding: 2px 7px; border-radius: 20px; }

        /* MOBILE FIXES */
        @media (max-width: 480px) {
            header { height: 80px; padding: 0 15px; }
            .main-logo { height: 55px; }
            .search-container { margin: 0 10px; }
            .products-grid { grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
            .img-box { height: 130px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <span class="icon-btn" onclick="toggleInfo()">☰</span>
        <img src="logoo.png" alt="Logo" class="main-logo" onclick="location.reload()">
    </div>
    
    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="¿Qué estás buscando hoy?" onkeyup="render()">
    </div>

    <div class="header-icons">
        <span class="icon-btn" onclick="toggleTheme()">🌗</span>
        <span class="icon-btn" onclick="abrirModal('loginModal')">👤</span>
        <span class="icon-btn" onclick="verificarAdmin()">⚙️</span>
        <div class="icon-btn" onclick="toggleCart()">🛒 <b id="cartCount" class="qty-badge">0</b></div>
    </div>
</header>

<div class="overlay" id="mainOverlay" onclick="closeAll()"></div>

<div id="infoDrawer" class="drawer">
    <div class="drawer-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
            <h2 style="margin:0; color:var(--accent); font-size: 22px;">Menú</h2>
            <span onclick="toggleInfo()" style="cursor:pointer; font-size:28px">✕</span>
        </div>
        
        <div id="userBadge" style="display:none; background:rgba(59,130,246,0.1); padding:15px; border-radius:15px; margin-bottom:20px; border:1px solid var(--accent)">
            <p style="margin:0; font-weight:bold; color:var(--accent)">MODO MAYORISTA ACTIVO</p>
            <button class="btn" style="background:var(--danger); color:white; padding:8px; margin-top:10px; font-size:11px" onclick="logout()">Cerrar Sesión</button>
        </div>

        <p>📍 <b>Ubicación:</b><br>Paraná, Entre Ríos</p>
        <p>⏰ <b>Horarios:</b><br>Lun a Vie: 08:00 - 18:00</p>
        
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d108584.28821035043!2d-60.59858804609375!3d-31.737497299999997!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95b4528cd6921867%3A0xe962040089e82c5a!2sParan%C3%A1%2C%20Entre%20R%C3%ADos!5e0!3m2!1ses-419!2sar!4v1710000000000!5m2!1ses-419!2sar" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <a href="https://wa.me/5493434508948" target="_blank" class="btn" style="background:#25d366; color:white; text-decoration:none; display:block; text-align:center; margin-top:10px;">
            CONSULTAR WHATSAPP
        </a>
    </div>

    <div class="footer-logo-container">
        <img src="logoo.png" alt="Distribuidora" class="footer-logo">
    </div>
</div>

<div class="products-grid" id="productsCont"></div>

<div id="cartDrawer" class="drawer">
    <div class="drawer-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 style="margin:0; font-size: 22px;">Mi Carrito</h2>
            <span onclick="toggleCart()" style="cursor:pointer; font-size:28px">✕</span>
        </div>
        <div id="cartItemsList"></div>
    </div>
    <div style="padding:20px; border-top:1px solid rgba(128,128,128,0.2); background: var(--card);">
        <select id="deliveryMethod" onchange="toggleDeliveryForm()">
            <option value="retiro">Retiro en local</option>
            <option value="envio">Envío a domicilio</option>
        </select>
        <div id="deliveryForm">
            <input id="envioNombre" placeholder="Tu Nombre">
            <input id="envioDireccion" placeholder="Dirección">
            <input id="envioLocalidad" placeholder="Localidad">
        </div>
        <h3 id="cartTotalText" style="margin: 15px 0; font-size: 20px;">Total: $0</h3>
        <button class="btn btn-primary" style="background:#25d366" onclick="enviarWhatsApp()">FINALIZAR POR WHATSAPP</button>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content">
        <div id="loginView">
            <h2 style="margin-top:0">Acceso Mayorista</h2>
            <input id="userInp" placeholder="Usuario">
            <input id="passInp" type="password" placeholder="Contraseña">
            <button class="btn btn-primary" id="btnLogin" onclick="checkLogin()">INGRESAR</button>
            <button class="btn" style="margin-top:10px; background:none; color:var(--text)" onclick="closeAll()">Cerrar</button>
            <p style="text-align:center; margin-top:15px; font-size: 13px;">¿Nuevo cliente? <a href="#" onclick="switchAuth(true)" style="color:var(--accent)">Solicitar alta</a></p>
        </div>
        <div id="regView" style="display:none">
            <h2>Solicitud de Alta</h2>
            <input id="regNom" placeholder="Nombre / Comercio">
            <input id="regCuit" placeholder="CUIT / DNI">
            <input id="regUser" placeholder="Elegir Usuario">
            <input id="regPass" type="password" placeholder="Elegir Contraseña">
            <button class="btn btn-primary" onclick="enviarSolicitud()">ENVIAR SOLICITUD</button>
            <button class="btn" style="margin-top:10px; background:none; color:var(--text)" onclick="switchAuth(false)">Volver</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [];
    let carrito = [];
    let esMayorista = localStorage.getItem("neo_may") === "true";

    db.collection("productos").onSnapshot(snap => { 
        productos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); 
        render(); 
        verificarInsigniaMayorista();
    });

    function render() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        cont.innerHTML = productos.filter(p => p.nombre.toLowerCase().includes(query)).map(p => `
            <div class="product-card">
                ${p.promo && !esMayorista ? `<div style="background:var(--promo); color:#000; font-size:11px; font-weight:900; padding:6px; text-align:center;">🔥 ${p.promo}</div>` : ''}
                <div class="img-box"><img src="${p.imagen || 'https://via.placeholder.com/150'}" loading="lazy"></div>
                <div class="info-box">
                    <div style="font-size:10px; color:var(--success); font-weight:700; margin-bottom:5px;">📦 ${p.stock || 0} disp.</div>
                    <h4 style="margin:0 0 8px 0; font-size:15px; height:36px; overflow:hidden;">${p.nombre}</h4>
                    <div class="price-val">$${esMayorista ? p.precio_may : p.precio}</div>
                    <button class="btn btn-primary" onclick="addToCart('${p.id}')" style="margin-top:12px; padding:10px; font-size:11px">AGREGAR</button>
                </div>
            </div>`).join("");
    }

    function addToCart(id) { const ex = carrito.find(c => c.id === id); if(ex) ex.qty++; else carrito.push({id, qty:1}); updateCartUI(); }
    
    function updateCartUI() {
        document.getElementById("cartCount").innerText = carrito.reduce((a,b)=>a+b.qty,0);
        let total = 0;
        const list = document.getElementById("cartItemsList");
        list.innerHTML = carrito.map(it => {
            const p = productos.find(x => x.id === it.id);
            const sub = (esMayorista ? p.precio_may : p.precio) * it.qty;
            total += sub;
            return `<div style="display:flex; justify-content:space-between; margin-bottom:15px; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px;">
                <div><b>${p.nombre}</b><br><small>${it.qty} x $${esMayorista ? p.precio_may : p.precio}</small></div>
                <b>$${sub}</b>
            </div>`;
        }).join("");
        document.getElementById("cartTotalText").innerText = "Total: $" + total;
    }

    function toggleInfo() { document.getElementById("infoDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function toggleTheme() { document.body.classList.toggle("light"); }
    function closeAll() { document.querySelectorAll(".drawer").forEach(d => d.classList.remove("active")); document.getElementById("mainOverlay").classList.remove("active"); document.querySelectorAll(".modal").forEach(m => m.style.display="none"); }
    function abrirModal(id) { closeAll(); document.getElementById(id).style.display = "flex"; }
    function toggleDeliveryForm() { document.getElementById("deliveryForm").style.display = document.getElementById("deliveryMethod").value === "envio" ? "block" : "none"; }

    async function checkLogin() { 
        const u = document.getElementById("userInp").value, p = document.getElementById("passInp").value;
        const q = await db.collection("usuarios_mayoristas").where("user", "==", u).where("pass", "==", p).get();
        if(!q.empty) {
            esMayorista = true; localStorage.setItem("neo_may", "true");
            location.reload();
        } else { alert("Datos incorrectos"); }
    }
    
    function logout() { localStorage.removeItem("neo_may"); location.reload(); }
    function verificarInsigniaMayorista() { document.getElementById("userBadge").style.display = esMayorista ? "block" : "none"; }
    function verificarAdmin() { if(prompt("Clave:") === "admin") alert("Panel Admin en desarrollo"); }
</script>
</body>
</html>
