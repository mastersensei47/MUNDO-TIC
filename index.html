<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Tienda Online</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin:0;
      background:#f4f4f4;
      overflow-x: hidden;
    }

    header {
      background:#111;
      color:white;
      padding:15px 20px;
      display: flex;
      align-items:center;
      justify-content: space-between;
      font-size:22px;
      position: sticky;
      top:0;
      z-index: 1000;
    }

    header .logo {
      font-weight:bold;
    }

    header .carrito-icon {
      cursor:pointer;
      font-size:24px;
      position: relative;
    }

    header .carrito-icon span {
      background:red;
      color:white;
      border-radius:50%;
      padding:2px 6px;
      position:absolute;
      top:-8px;
      right:-10px;
      font-size:14px;
      font-weight:bold;
    }

    nav {
      display:none; /* ya no usamos nav tipo menú */
    }

    section {
      padding:20px;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
      gap:20px;
    }

    .card {
      background:white;
      padding:10px;
      border-radius:8px;
      box-shadow:0 0 5px rgba(0,0,0,0.2);
      text-align:center;
    }

    .card img {
      width:100%;
      height:150px;
      object-fit:cover;
      border-radius:5px;
    }

    .btn {
      padding:8px 12px;
      border:none;
      border-radius:5px;
      cursor:pointer;
      margin-top:5px;
    }

    .verde { background:green; color:white; }
    .rojo { background:red; color:white; }

    input {
      padding:8px;
      width:90%;
      margin-bottom:10px;
    }

    footer {
      background:#111;
      color:white;
      text-align:center;
      padding:10px;
      margin-top:20px;
    }

    /* Panel Carrito */
    #carritoPanel {
      position:fixed;
      top:0;
      right:-100%;
      width:350px;
      height:100%;
      background:#fff;
      box-shadow:-3px 0 7px rgba(0,0,0,0.3);
      transition:0.3s ease;
      z-index:999;
      padding:20px;
    }

    #carritoPanel.open {
      right:0;
    }

    #carritoPanel h3 {
      margin-top:0;
    }

    #carritoPanel button.cerrar {
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      border-radius:5px;
      cursor:pointer;
      float:right;
      margin-top:-10px;
      margin-right:-10px;
      font-size:18px;
    }

    #envioForm {
      display:none;
      margin-top:20px;
    }

  </style>
</head>
<body>

<header>
  <div class="logo">Mi Tienda Online</div>
  <div class="carrito-icon" onclick="toggleCarrito()">
    🛒 <span id="contadorCarrito">0</span>
  </div>
</header>

<section id="productos">
  <h2>Productos</h2>
  <div class="grid" id="listaProductos"></div>
</section>

<!-- Carrito Panel -->
<div id="carritoPanel">
  <button class="cerrar" onclick="toggleCarrito()">×</button>
  <h3>Tu Carrito</h3>
  <div id="listaCarrito"></div>
  <h3>Total: $<span id="totalCarrito">0</span></h3>
  <button class="btn verde" onclick="mostrarEnvio()">Continuar al Envío</button>

  <!-- Formulario Envío -->
  <div id="envioForm">
    <h4>Datos de Envío</h4>
    <input type="text" id="nombreEnvio" placeholder="Nombre">
    <input type="text" id="direccionEnvio" placeholder="Dirección">
    <input type="text" id="telefonoEnvio" placeholder="Teléfono">
    <button class="btn verde" onclick="enviarPedido()">Enviar por WhatsApp</button>
  </div>
</div>

<footer>© 2026 Mi Tienda Online</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 CONFIG FIREBASE (tienda-online-baaf6) */
const firebaseConfig = {
  apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
  authDomain: "tienda-online-baaf6.firebaseapp.com",
  projectId: "tienda-online-baaf6",
  storageBucket: "tienda-online-baaf6.firebasestorage.app",
  messagingSenderId: "121093097347",
  appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let carrito = [];

/* -------- Cargar Productos -------- */
async function cargarProductos(){
  const lista = document.getElementById("listaProductos");
  lista.innerHTML="";
  const snapshot = await getDocs(collection(db,"productos"));

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    lista.innerHTML += `
      <div class="card">
        <img src="${data.imagen}">
        <h4>${data.nombre}</h4>
        <p>$${data.precio}</p>
        <button class="btn verde" onclick="agregarCarrito('${data.nombre}',${data.precio})">
          Agregar al carrito
        </button>
      </div>
    `;
  });
}

window.agregarCarrito = function(nombre,precio){
  carrito.push({nombre,precio});
  actualizarCarritoUI();
}

window.eliminarCarrito = function(index){
  carrito.splice(index,1);
  actualizarCarritoUI();
}

function actualizarCarritoUI(){
  const lista = document.getElementById("listaCarrito");
  const contador = document.getElementById("contadorCarrito");
  const totalSpan = document.getElementById("totalCarrito");

  lista.innerHTML="";
  let total=0;
  carrito.forEach((item,index)=>{
    total += item.precio;
    lista.innerHTML += `
      <div>
        ${item.nombre} - $${item.precio}
        <button class="btn rojo" onclick="eliminarCarrito(${index})">Eliminar</button>
      </div>
    `;
  });

  contador.textContent = carrito.length;
  totalSpan.textContent = total;
}

function toggleCarrito(){
  document.getElementById("carritoPanel").classList.toggle("open");
}

function mostrarEnvio(){
  document.getElementById("envioForm").style.display="block";
}

/* -------- Enviar por WhatsApp -------- */
window.enviarPedido = function(){

  if(carrito.length === 0){
    alert("El carrito está vacío");
    return;
  }

  const nombre = document.getElementById("nombreEnvio").value;
  const direccion = document.getElementById("direccionEnvio").value;
  const telefono = document.getElementById("telefonoEnvio").value;

  let mensaje = "Pedido:%0A";

  carrito.forEach(item=>{
    mensaje += `${item.nombre} - $${item.precio}%0A`;
  });

  mensaje += `%0ANombre: ${nombre}%0ADirección: ${direccion}%0ATeléfono: ${telefono}`;

  window.open(`https://wa.me/5493434508948?text=${mensaje}`, "_blank");
  
  carrito = [];
  actualizarCarritoUI();
  toggleCarrito();
}

/* -------- Inicializar -------- */
cargarProductos();

</script>

</body>
</html>
