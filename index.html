<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Tienda</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

header input{
padding:8px;
width:250px;
}

.container{
display:flex;
}

.products{
flex:1;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:8px;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.price{
color:#1976d2;
font-weight:bold;
}

button{
padding:8px;
border:none;
background:#7b1fa2;
color:white;
cursor:pointer;
margin-top:5px;
}

.cart{
width:260px;
background:white;
padding:20px;
box-shadow:-2px 0 5px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<header>

<h2>Tienda</h2>

<input id="buscar" placeholder="Buscar producto">

</header>

<div class="container">

<div id="productos" class="products"></div>

<div class="cart">

<h3>Carrito</h3>

<div id="carrito"></div>

<p>Total: $<span id="total">0</span></p>

<button onclick="enviar()">Enviar WhatsApp</button>

</div>

</div>

<script>

let productos = JSON.parse(localStorage.getItem("productos")) || [

{
nombre:"Batería Samsung A51",
precio:16950,
img:"https://picsum.photos/200?1"
},

{
nombre:"Batería iPhone 11",
precio:18900,
img:"https://picsum.photos/200?2"
}

]

let carrito=[]

const admin = location.hash === "#admin"

function guardar(){

localStorage.setItem("productos",JSON.stringify(productos))

}

function render(){

const cont=document.getElementById("productos")

cont.innerHTML=""

productos.forEach((p,i)=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.img}">

${admin ?

`<input value="${p.nombre}" onchange="editNombre(${i},this.value)">`

:

`<h3>${p.nombre}</h3>`}

${admin ?

`<input value="${p.precio}" onchange="editPrecio(${i},this.value)">`

:

`<p class="price">$${p.precio}</p>`}

<button onclick="agregar(${i})">

Agregar

</button>

</div>

`

})

}

function editNombre(i,val){

productos[i].nombre=val

guardar()

}

function editPrecio(i,val){

productos[i].precio=val

guardar()

}

function agregar(i){

carrito.push(productos[i])

renderCarrito()

}

function renderCarrito(){

let lista=document.getElementById("carrito")

lista.innerHTML=""

let total=0

carrito.forEach(p=>{

lista.innerHTML+=`<div>${p.nombre} $${p.precio}</div>`

total+=Number(p.precio)

})

document.getElementById("total").innerText=total

}

function enviar(){

let texto="Pedido:%0A"

carrito.forEach(p=>{

texto+=p.nombre+" $"+p.precio+"%0A"

})

window.open("https://wa.me/?text="+texto)

}

document.getElementById("buscar").addEventListener("input",e=>{

let val=e.target.value.toLowerCase()

let filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(val))

mostrarBusqueda(filtrados)

})

function mostrarBusqueda(lista){

const cont=document.getElementById("productos")

cont.innerHTML=""

lista.forEach((p,i)=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.nombre}</h3>

<p class="price">$${p.precio}</p>

<button onclick="agregar(${i})">

Agregar

</button>

</div>

`

})

}

render()

</script>

</body>

</html>
