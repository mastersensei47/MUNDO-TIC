<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1a2e;
    color:white;
}

header{
    background:#1f2d3d;
    padding:10px;
    display:flex;
    justify-content:center;
}

#buscar{
    width:300px;
    padding:8px;
    border-radius:20px;
    border:none;
}

.container{
    display:flex;
}

.menu{
    width:200px;
    background:#2c49b0;
    padding:20px;
}

.menu button{
    width:100%;
    margin-bottom:10px;
    padding:10px;
    border:none;
    background:#3b63ff;
    color:white;
    cursor:pointer;
}

.productos{
    flex:1;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.producto{
    background:#15233a;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.producto img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.producto button{
    margin-top:10px;
    background:#3b63ff;
    border:none;
    padding:8px;
    color:white;
    cursor:pointer;
}

.carrito{
    width:250px;
    background:#243248;
    padding:20px;
}

.total{
    margin-top:20px;
    font-size:18px;
}

.whatsapp{
    margin-top:10px;
    background:#2ecc71;
    border:none;
    padding:10px;
    width:100%;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<input id="buscar" placeholder="Buscar...">
</header>

<div class="container">

<div class="menu">
<button onclick="mostrar('todos')">Inicio</button>
<button onclick="mostrar('mayorista')">Mayorista</button>
</div>

<div id="productos" class="productos"></div>

<div class="carrito">
<h2>Carrito</h2>
<div id="listaCarrito"></div>
<div class="total">Total: $<span id="total">0</span></div>
<button class="whatsapp" onclick="enviarWhatsapp()">Enviar WhatsApp</button>
</div>

</div>

<script>

const productos = [
{
nombre:"Producto 1",
precio:10,
categoria:"todos",
img:"https://via.placeholder.com/200"
},
{
nombre:"Producto 2",
precio:15,
categoria:"mayorista",
img:"https://via.placeholder.com/200"
},
{
nombre:"Producto 3",
precio:20,
categoria:"todos",
img:"https://via.placeholder.com/200"
}
];

let carrito=[];

function mostrar(categoria){

const contenedor=document.getElementById("productos");
contenedor.innerHTML="";

productos.forEach((p,i)=>{

if(categoria==="todos" || p.categoria===categoria){

contenedor.innerHTML+=`
<div class="producto">
<img src="${p.img}">
<h3>${p.nombre}</h3>
<p>$${p.precio}</p>
<button onclick="agregar(${i})">Agregar</button>
</div>
`;

}

});

}

function agregar(i){

carrito.push(productos[i]);
actualizarCarrito();

}

function actualizarCarrito(){

const lista=document.getElementById("listaCarrito");
lista.innerHTML="";

let total=0;

carrito.forEach(p=>{
lista.innerHTML+=`<div>${p.nombre} - $${p.precio}</div>`;
total+=p.precio;
});

document.getElementById("total").innerText=total;

}

function enviarWhatsapp(){

let texto="Pedido:%0A";

carrito.forEach(p=>{
texto+=p.nombre+" - $"+p.precio+"%0A";
});

window.open("https://wa.me/?text="+texto);

}

mostrar("todos");

</script>

</body>
</html>
