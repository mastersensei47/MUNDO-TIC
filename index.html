<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS47 - SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
            --input-bg: rgba(30, 41, 59, 0.7); --radius: 18px;
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --input-bg: #f1f5f9;
        }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; overflow-x: hidden; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; background: var(--card); position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); height: 100px;
        }
        .main-logo { height: 80px; width: auto; object-fit: contain; }

        /* BUSCADOR: Como en tu captura, centrado y amplio */
        .search-container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .search-bar { width: 100%; padding: 15px 25px; border-radius: 15px; border: 1px solid rgba(128,128,128,0.2); background: var(--input-bg); color: inherit; font-size: 16px; outline: none; }

        .header-icons { display: flex; gap: 20px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 22px; position: relative; transition: 0.2s; }
        .badge { position: absolute; top: -8px; right: -10px; background: var(--danger); color: white; font-size: 11px; padding: 2px 7px; border-radius: 12px; font-weight: 800; }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 1400px; margin: auto; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; } }
        
        .product-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(128,128,128,0.1); position: relative; display: flex; flex-direction: column; transition: 0.3s; }
        .promo-tag { position: absolute; top: 12px; left: 12px; background: var(--promo); color: #000; font-size: 11px; font-weight: 800; padding: 5px 10px; border-radius: 8px; z-index: 10; }
        
        .img-container { background: #fff; height: 180px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-container img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .product-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-name { font-size: 15px; font-weight: 600; margin-bottom: 8px; height: 36px; overflow: hidden; }
        .product-price { font-size: 22px; font-weight: 900; color: var(--accent); margin-bottom: 15px; }

        .drawer { position: fixed; top: 0; width: 85%; max-width: 400px; height: 100%; background: var(--card); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 5000; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #cartDrawer { right: -100%; } #cartDrawer.active { right: 0; }
        #menuDrawer { left: -100%; } #menuDrawer.active { left: 0; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(128,128,128,0.1); }
        .qty-box { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 10px; }
        
        .btn-action { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-action:active { transform: scale(0.97); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); display: none; z-index: 4000; }
        .overlay.active { display: block; }
    </style>
</head>
<body class="dark">

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <span class="icon-btn" onclick="toggleMenu()">☰</span>
        <img src="logoo.png" class="main-logo">
    </div>
    <div class="header-icons">
        <span class="icon-btn" onclick="toggleTheme()">🌗</span>
        <span class="icon-btn" onclick="verificarAdmin()">⚙️</span>
        <div class="icon-btn" onclick="toggleCart()">🛒 <b id="cartCount" class="badge">0</b></div>
    </div>
</header>

<div class="search-container">
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar producto..." onkeyup="render()">
</div>

<div class="products-grid" id="productsCont"></div>

<div class="overlay" id="mainOverlay" onclick="closeAll()"></div>

<div id="cartDrawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2 style="margin:0">Mi Pedido</h2>
        <span onclick="toggleCart()" style="cursor:pointer; font-size:24px">✕</span>
    </div>
    <div id="cartItemsList" style="flex-grow:1; overflow-y:auto"></div>
    <div id="cartSummary" style="margin-top:20px; padding-top:20px; border-top:2px dashed rgba(128,128,128,0.3)">
        </div>
    <button class="btn-action" style="background:#25d366; margin-top:15px" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP</button>
</div>

<div id="menuDrawer" class="drawer">
    <h2 style="color:var(--accent)">Distribuidora Elnen</h2>
    <hr style="opacity:0.1; margin:20px 0">
    <p>📍 Belgrano 7102, Santa Fe</p>
    <p>📞 WhatsApp: 3434508948</p>
    <div style="margin-top:auto">
        <button class="btn-action" onclick="logout()">Cerrar Sesión</button>
    </div>
</div>

<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [], carrito = [];
    let esMayorista = localStorage.getItem("ms47_may") === "true";

    // Listener de productos
    db.collection("productos").onSnapshot(snap => {
        productos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
    });

    function render() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        
        cont.innerHTML = productos.filter(p => p.nombre.toLowerCase().includes(query)).map(p => {
            const precioMostrar = esMayorista ? p.precio_may : p.precio;
            return `
            <div class="product-card">
                ${p.promo && !esMayorista ? `<div class="promo-tag">Llevando ${p.promo}</div>` : ''}
                <div class="img-container"><img src="${p.imagen}"></div>
                <div class="product-info">
                    <span class="product-name">${p.nombre}</span>
                    <span class="product-price">$${precioMostrar}</span>
                    <button class="btn-action" onclick="addToCart('${p.id}')">AGREGAR</button>
                </div>
            </div>`;
        }).join("");
    }

    // LÓGICA DE CÁLCULO DE PROMOCIONES (Basado en tus fotos)
    function calcularPrecioFinal(p, qty) {
        let precioBase = esMayorista ? p.precio_may : p.precio;
        
        if (!esMayorista && p.promo) {
            // Ejemplo de p.promo: "3 10000" o "3x10000"
            const match = p.promo.match(/(\d+)\s*[xX]?\s*(\d+)/);
            if (match) {
                const cantRequerida = parseInt(match[1]);
                const precioPromoTotal = parseInt(match[2]);
                if (qty >= cantRequerida) {
                    return (precioPromoTotal / cantRequerida); // Precio unitario con descuento
                }
            }
        }
        return precioBase;
    }

    function updateCartUI() {
        let total = 0;
        const list = document.getElementById("cartItemsList");
        
        list.innerHTML = carrito.map(it => {
            const p = productos.find(x => x.id === it.id);
            const precioUnitarioReal = calcularPrecioFinal(p, it.qty);
            const subtotal = precioUnitarioReal * it.qty;
            total += subtotal;

            return `
            <div class="cart-item">
                <div style="flex:1">
                    <div style="font-weight:600; font-size:14px">${p.nombre}</div>
                    <div style="color:var(--accent); font-weight:800">$${subtotal.toFixed(0)}</div>
                </div>
                <div class="qty-box">
                    <span style="cursor:pointer" onclick="changeQty('${it.id}', -1)">-</span>
                    <b style="min-width:20px; text-align:center">${it.qty}</b>
                    <span style="cursor:pointer" onclick="changeQty('${it.id}', 1)">+</span>
                </div>
            </div>`;
        }).join("");

        document.getElementById("cartCount").innerText = carrito.reduce((a, b) => a + b.qty, 0);
        document.getElementById("cartSummary").innerHTML = `
            <div style="display:flex; justify-content:space-between; font-size:22px; font-weight:900">
                <span>TOTAL:</span>
                <span style="color:var(--accent)">$${total.toFixed(0)}</span>
            </div>
        `;
    }

    function enviarWhatsApp() {
        if(!carrito.length) return;
        let totalG = 0;
        let msg = "*PEDIDO DISTRIBUIDORA ELNEN*\n--------------------------\n";
        
        carrito.forEach(it => {
            const p = productos.find(x => x.id === it.id);
            const pReal = calcularPrecioFinal(p, it.qty);
            const sub = pReal * it.qty;
            msg += `• ${p.nombre} (x${it.qty}) -> $${sub.toFixed(0)}\n`;
            totalG += sub;
        });
        
        msg += `--------------------------\n*TOTAL A PAGAR: $${totalG.toFixed(0)}*`;
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
    }

    // Funciones de control
    function addToCart(id) { 
        const ex = carrito.find(c => c.id === id); 
        if(ex) ex.qty++; else carrito.push({id, qty:1}); 
        updateCartUI(); 
        if(!document.getElementById("cartDrawer").classList.contains("active")) toggleCart();
    }
    
    function changeQty(id, delta) {
        const it = carrito.find(c => c.id === id);
        if(it) {
            it.qty += delta;
            if(it.qty <= 0) carrito = carrito.filter(c => c.id !== id);
            updateCartUI();
        }
    }

    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function toggleMenu() { document.getElementById("menuDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function closeAll() { document.querySelectorAll(".drawer").forEach(d => d.classList.remove("active")); document.getElementById("mainOverlay").classList.remove("active"); }
    function toggleTheme() { document.body.classList.toggle("light"); }
    function logout() { localStorage.removeItem("ms47_may"); location.reload(); }
    function verificarAdmin() { if(prompt("Contraseña Admin:") === "admin47") alert("Acceso concedido (Simulado)"); }
</script>
</body>
</html>
