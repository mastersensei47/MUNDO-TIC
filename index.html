<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS47 - SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0b1120; --card: #161f32; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
            --input-bg: #1e293b; --radius: 18px;
        }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); overflow-x: hidden; }

        /* HEADER */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; background: #0b1120; position: sticky; top: 0; z-index: 1000; 
            height: 70px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .main-logo { height: 45px; width: auto; object-fit: contain; }
        .header-icons { display: flex; gap: 15px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 18px; opacity: 0.7; transition: 0.2s; position: relative; }
        .icon-btn:hover { opacity: 1; }

        /* BUSCADOR */
        .search-section { padding: 30px 20px; display: flex; justify-content: center; }
        .search-bar { 
            width: 100%; max-width: 500px; padding: 14px 20px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: var(--card); color: white; outline: none;
        }

        /* GRID DE PRODUCTOS */
        .products-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 20px; padding: 0 20px 40px; max-width: 1200px; margin: auto; 
        }
        @media (max-width: 600px) { .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; } }

        .product-card { 
            background: var(--card); border-radius: var(--radius); overflow: hidden; 
            display: flex; flex-direction: column; position: relative; transition: 0.3s;
        }
        .promo-badge { 
            position: absolute; top: 12px; left: 12px; background: var(--promo); 
            color: #000; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; z-index: 5; 
        }
        .img-container { background: white; width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; }
        .img-container img { max-width: 80%; max-height: 80%; object-fit: contain; }
        
        .product-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { margin: 0 0 10px; font-size: 14px; font-weight: 600; color: #94a3b8; }
        .product-price { font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 15px; }
        .btn-add { 
            background: var(--accent); color: white; border: none; padding: 12px; 
            border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%;
        }

        /* MODALES */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; justify-content: center; align-items: center; z-index: 5000; padding: 20px; 
        }
        .modal-content { 
            background: var(--card); padding: 30px; border-radius: 24px; 
            width: 100%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        input { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); background: var(--input-bg); color: white; box-sizing: border-box; 
        }
        .btn-back { 
            background: transparent; color: var(--accent); border: none; 
            margin-top: 15px; cursor: pointer; font-size: 14px; font-weight: 600; text-decoration: underline;
        }

        /* PANEL CARRITO */
        .drawer { 
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px; 
            height: 100%; background: var(--card); transition: 0.4s; z-index: 4000; padding: 25px; box-sizing: border-box; 
        }
        .drawer.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 3000; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <span class="icon-btn">☰</span>
        <img src="logoo.png" class="main-logo">
    </div>
    <div class="header-icons">
        <span class="icon-btn">🌓</span>
        <span class="icon-btn" onclick="openModal('loginModal')">👤</span>
        <span class="icon-btn">⚙️</span>
        <span class="icon-btn" onclick="toggleCart()">🛒 <b id="cartCount" style="background:var(--danger); font-size:10px; padding:2px 5px; border-radius:10px; position:absolute; top:-5px; right:-8px;">0</b></span>
    </div>
</header>

<div class="search-section">
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar productos..." onkeyup="render()">
</div>

<div class="products-grid" id="productsCont"></div>

<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2 style="margin-top:0; font-size:24px;">Acceso</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-add" style="margin-top:10px;" onclick="checkLogin()">ENTRAR</button>
        <p style="font-size:13px; color:#94a3b8; margin-top:15px;">¿Sos mayorista? <span style="color:var(--accent); cursor:pointer">Registrate acá</span></p>
        
        <button class="btn-back" onclick="closeModal('loginModal')">Volver atrás</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="drawer" id="cartDrawer">
    <h3>Mi Pedido</h3>
    <div id="cartList" style="flex-grow:1; overflow-y:auto;"></div>
    <div id="cartTotal" style="font-size:20px; font-weight:800; margin:20px 0;">Total: $0</div>
    <button class="btn-add" style="background:#25d366" onclick="sendWA()">PEDIR POR WHATSAPP</button>
</div>

<script>
    // Configuración Firebase (Usando la tuya)
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [], carrito = [];

    // Cargar Datos
    db.collection("productos").onSnapshot(s => {
        productos = s.docs.map(d => ({id: d.id, ...d.data()}));
        render();
    });

    function render() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        cont.innerHTML = productos.filter(p => p.nombre.toLowerCase().includes(q)).map(p => `
            <div class="product-card">
                ${p.promo ? `<div class="promo-badge">${p.promo}</div>` : ''}
                <div class="img-container"><img src="${p.imagen}"></div>
                <div class="product-info">
                    <div class="product-title">${p.nombre}</div>
                    <div class="product-price">$${p.precio}</div>
                    <button class="btn-add" onclick="add('${p.id}')">AGREGAR</button>
                </div>
            </div>
        `).join("");
    }

    function add(id) {
        const item = carrito.find(c => c.id === id);
        if(item) item.qty++; else carrito.push({id, qty:1});
        updateCart();
    }

    function updateCart() {
        let total = 0, count = 0;
        carrito.forEach(c => {
            const p = productos.find(x => x.id === c.id);
            total += p.precio * c.qty;
            count += c.qty;
        });
        document.getElementById("cartCount").innerText = count;
        document.getElementById("cartTotal").innerText = "Total: $" + total;
    }

    // Funciones de Interfaz
    function openModal(id) { document.getElementById(id).style.display = "flex"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
    function toggleCart() { 
        document.getElementById("cartDrawer").classList.toggle("active"); 
        document.getElementById("overlay").classList.toggle("active");
    }
    function closeAll() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = "none");
        document.getElementById("cartDrawer").classList.remove("active");
        document.getElementById("overlay").classList.remove("active");
    }
</script>

</body>
</html>
