<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO REPUESTOS - SISTEMA FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); transition:0.3s; }
        header { display:flex; justify-content:space-between; align-items:center; padding:15px 25px; background:var(--card); position:sticky; top:0; z-index:1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; padding:20px; }
        .card { background:var(--card); padding:20px; border-radius:15px; text-align:center; position:relative; border: 1px solid #334155; }
        .card img { width: 100%; height: 150px; object-fit: contain; border-radius:10px; }
        .promo-tag { position:absolute; top:10px; left:10px; background:var(--promo); color:black; font-size:11px; font-weight:bold; padding:4px 8px; border-radius:5px; z-index:10; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 4000; padding:15px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 850px; max-height: 90vh; overflow-y: auto; position: relative; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        th, td { border-bottom: 1px solid #334155; padding: 12px; text-align: left; }
        .btn-act { padding: 6px 10px; border-radius: 5px; cursor: pointer; border: none; color: white; font-weight: bold; }

        #cartDrawer { position:fixed; right:-400px; top:0; width:350px; height:100%; background:var(--card); transition:0.4s; z-index:3500; padding:25px; box-sizing:border-box; box-shadow:-10px 0 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 3000; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<header>
    <b onclick="location.reload()" style="cursor:pointer; font-size:20px;">NEO <span style="color:var(--accent)">REPUESTOS</span></b>
    <div style="display:flex; gap:20px; align-items:center">
        <span onclick="abrirModal('loginModal')" style="cursor:pointer; font-size:20px">👤</span>
        <span onclick="abrirAdmin()" style="cursor:pointer; font-size:20px">⚙️</span>
        <div onclick="toggleCart()" style="cursor:pointer; position:relative">
            🛒 <b id="cartBadge" style="position:absolute; top:-10px; right:-10px; background:var(--danger); color:white; font-size:11px; padding:2px 6px; border-radius:50%">0</b>
        </div>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeAll()"></div>
<div class="products" id="productsCont"></div>

<div id="cartDrawer">
    <h2 style="margin-top:0">Mi Pedido</h2>
    <div id="cartList" style="flex-grow:1; overflow-y:auto"></div>
    <div style="border-top:1px solid #334155; padding-top:15px; margin-top:15px">
        <div id="totalDisplay" style="font-size:20px; font-weight:bold; margin-bottom:15px">Total: $0</div>
        <button class="btn-main" style="background:#25d366" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP</button>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:350px">
        <div id="secLogin">
            <h3>Acceso Mayorista</h3>
            <input id="u" placeholder="Usuario">
            <input id="p_log" type="password" placeholder="Contraseña">
            <button class="btn-main" onclick="validarLogin()">INGRESAR</button>
            <p style="text-align:center; font-size:13px">¿No tenés cuenta? <a href="#" onclick="toggleAuth('R')" style="color:var(--accent)">Registrate acá</a></p>
        </div>
        <div id="secReg" style="display:none">
            <h3>Solicitud de Alta</h3>
            <input id="rn" placeholder="Nombre / Empresa">
            <input id="rc" placeholder="CUIT">
            <input id="re" placeholder="Email">
            <button class="btn-main" style="background:var(--success)" onclick="registrarMay()">ENVIAR SOLICITUD</button>
            <button class="btn-main" style="background:none; border:1px solid #444; margin-top:10px" onclick="toggleAuth('L')">← VOLVER AL LOGIN</button>
        </div>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <span onclick="cerrarModales()" style="float:right; cursor:pointer; font-size:20px">✕</span>
        <h2>Administración</h2>
        
        <div style="display:flex; gap:10px; margin-bottom:20px; overflow-x: auto;">
            <button class="btn-main" onclick="tabAdmin('prods')">STOCK</button>
            <button class="btn-main" style="background:#6366f1" onclick="tabAdmin('solis')">SOLICITUDES</button>
            <button class="btn-main" style="background:var(--success)" onclick="tabAdmin('ventas')">VENTAS</button>
        </div>

        <div id="tabProds">
            <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:10px; margin-bottom:15px">
                <input type="hidden" id="eid">
                <input id="an" placeholder="Nombre del Repuesto">
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px">
                    <input id="ap" type="number" placeholder="Precio Min.">
                    <input id="apm" type="number" placeholder="Precio May.">
                    <input id="as" type="number" placeholder="Stock">
                </div>
                <select id="apromo">
                    <option value="">Sin Promo</option>
                    <option value="2x1">2x1</option>
                    <option value="3x2">3x2</option>
                    <option value="Pack">Pack Especial</option>
                </select>
                <input id="ai" placeholder="Link de Imagen">
                <button class="btn-main" onclick="guardarFirebase()">GUARDAR PRODUCTO</button>
            </div>
            <table>
                <thead><tr><th>Producto</th><th>Stock</th><th>Acciones</th></tr></thead>
                <tbody id="bodyProds"></tbody>
            </table>
        </div>

        <div id="tabSolis" style="display:none">
            <h3>Pendientes de Aprobación</h3>
            <table>
                <thead><tr><th>Cliente</th><th>Email</th><th>CUIT</th><th>Acciones</th></tr></thead>
                <tbody id="bodySolis"></tbody>
            </table>
        </div>

        <div id="tabVentas" style="display:none">
            <button onclick="vaciarVentas()" style="background:var(--danger); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; margin-bottom:15px">⚠️ VACIAR TODO EL HISTORIAL</button>
            <table>
                <thead><tr><th>Fecha/Hora</th><th>Pedido</th><th>Total</th><th>Acción</th></tr></thead>
                <tbody id="bodyVentas"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let repuestos = [];
    let carrito = [];
    let esMayorista = sessionStorage.getItem("esMayorista") === "true";

    // CARGA DE DATOS
    db.collection("productos").onSnapshot(snap => {
        repuestos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
        cargarTablaProds();
    });

    db.collection("solicitudes_mayoristas").onSnapshot(snap => {
        cargarTablaSolis(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
    });

    db.collection("ventas").orderBy("creado", "desc").onSnapshot(snap => {
        cargarTablaVentas(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
    });

    function render() {
        const cont = document.getElementById("productsCont");
        cont.innerHTML = repuestos.map(r => `
            <div class="card">
                ${r.promo ? `<div class="promo-tag">${r.promo}</div>` : ''}
                <img src="${r.imagen || 'https://via.placeholder.com/150'}">
                <h4>${r.nombre}</h4>
                <div style="font-size:18px; font-weight:bold; color:var(--accent)">$${esMayorista ? r.precio_may : r.precio}</div>
                <div style="font-size:11px; color:#94a3b8">Stock: ${r.stock}</div>
                <button class="btn-main" onclick="addCar('${r.id}')" ${r.stock <= 0 ? 'disabled' : ''}>AGREGAR</button>
            </div>`).join("");
    }

    // CARRITO Y WHATSAPP
    function addCar(id) {
        const item = carrito.find(c => c.id === id);
        if(item) item.qty++; else carrito.push({id, qty:1});
        upCart();
    }

    function upCart() {
        const list = document.getElementById("cartList");
        let total = 0;
        list.innerHTML = carrito.map(c => {
            const r = repuestos.find(x => x.id === c.id);
            const sub = (esMayorista ? r.precio_may : r.precio) * c.qty;
            total += sub;
            return `<div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:13px">
                <span>${r.nombre} x${c.qty}</span>
