<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Repuestos PRO</title>
    <style>
        /* CONFIGURACIÓN DE COLORES - MODO OSCURO POR DEFECTO */
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --accent: #2563eb;
            --sidebar-bg: #1e40af; /* Azul vibrante de la imagen */
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
            --danger: #ef4444;
        }

        /* MODO CLARO OPCIONAL */
        body.light-mode {
            --bg: #f4f6f9;
            --card: #ffffff;
            --text: #111;
            --sidebar-bg: #2563eb;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); transition: .3s; overflow-x: hidden; }

        /* HEADER & SEARCH */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: var(--card); box-shadow: var(--shadow);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-container img { height: 45px; display: block; cursor: pointer; }
        
        .search-bar {
            flex-grow: 1; margin: 0 20px; max-width: 600px;
            background: rgba(255,255,255,0.05); border-radius: 8px;
            display: flex; align-items: center; padding: 5px 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .search-bar input {
            background: transparent; border: none; color: white; width: 100%; outline: none; padding: 8px;
        }

        /* SIDEBAR ESTILO PEDIX */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--sidebar-bg); color: white; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3000; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; font-weight: bold; font-size: 1.2em; display: flex; align-items: center; gap: 10px; }
        .sidebar a {
            display: flex; align-items: center; gap: 15px; padding: 15px 25px; 
            color: white; text-decoration: none; transition: 0.2s;
        }
        .sidebar a:hover { background: rgba(255,255,255,0.15); }
        
        .sidebar-footer {
            position: absolute; bottom: 0; width: 100%; background: #fb7185; 
            padding: 15px; text-align: center; font-size: 13px; font-weight: bold;
        }

        /* GRILLA DE PRODUCTOS */
        .container { padding: 25px; }
        .products { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
        }
        .card { 
            background: var(--card); border-radius: 15px; padding: 15px; 
            box-shadow: var(--shadow); transition: 0.3s; position: relative;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        
        .price { font-size: 1.2em; font-weight: bold; color: var(--accent); margin: 5px 0; }
        .promo-x2 { color: #10b981; font-size: 0.9em; font-weight: 600; }
        .badge-may { background: #fef3c7; color: #92400e; font-size: 11px; padding: 2px 6px; border-radius: 4px; display: inline-block; }

        /* BOTONES */
        button { 
            background: var(--accent); color: white; border: none; padding: 10px; 
            border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: 600;
        }
        .icon-btn { background: none; width: auto; font-size: 22px; padding: 5px; margin: 0 5px; }

        /* MODALES */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            display: none; justify-content: center; align-items: center; z-index: 4000; 
        }
        .modal-content { 
            background: var(--card); padding: 30px; border-radius: 20px; 
            width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; 
        }

        /* ADMIN PANEL */
        #adminPanel { display: none; background: var(--bg); padding: 20px; border-top: 2px solid var(--accent); }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 2500; }
        .overlay.active { display: block; }
    </style>
</head>
<body class="">

<header>
    <div style="display: flex; align-items: center;">
        <span class="icon-btn" onclick="toggleSidebar()">☰</span>
        <div class="logo-container">
            <img src="tu-logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/150x50?text=LOGO+AQUÍ'">
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="busqueda" placeholder="Buscar productos..." onkeyup="filtrar()">
    </div>

    <div style="display: flex;">
        <span class="icon-btn" onclick="toggleLightMode()">🌗</span>
        <span class="icon-btn" onclick="abrirLogin()">👤</span>
        <span class="icon-btn" onclick="alert('Carrito proximamente...')">🛒</span>
    </div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">📦 Menú Principal</div>
    <a href="#" onclick="toggleSidebar()">🏠 Inicio</a>
    <a href="#" onclick="alert('Somos una tienda de repuestos...')">ℹ️ Información</a>
    <a href="#" onclick="window.open('https://google.com/maps')">📍 Ubicación</a>
    <a href="https://instagram.com" target="_blank">📸 Instagram</a>
    <a href="#" onclick="openAdmin()">🔑 Administrador</a>
    <div class="sidebar-footer">¡Quiero una tienda así para mi emprendimiento!</div>
</nav>

<main class="container">
    <div id="adminPanel">
        <h3>🛠 Panel de Control</h3>
        <input type="hidden" id="editIndex">
        <div class="admin-grid">
            <input id="n" placeholder="Nombre">
            <input id="p_ind" type="number" placeholder="Precio Individual">
            <input id="p_x2" type="number" placeholder="Precio x2">
            <input id="p_may" type="number" placeholder="Precio Mayorista">
            <input id="stock" type="number" placeholder="Stock">
            <input id="img" placeholder="URL Imagen">
        </div>
        <button onclick="guardar()">Guardar Producto</button>
        <div id="listaAdmin" style="margin-top:20px"></div>
    </div>

    <h2 id="cat-label">Categorías</h2>
    <div class="products" id="products"></div>
</main>

<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2 id="logTitle">Mayorista</h2>
        <input id="u" placeholder="Usuario">
        <input id="pass" type="password" placeholder="Contraseña">
        <div id="box-login">
            <button onclick="login()">Ingresar</button>
            <p onclick="cambiarModo(true)" style="cursor:pointer; text-align:center">¿No tienes cuenta? Regístrate</p>
        </div>
        <div id="box-reg" style="display:none">
            <button onclick="registrar()" style="background:var(--sidebar-bg)">Crear Cuenta</button>
            <p onclick="cambiarModo(false)" style="cursor:pointer; text-align:center">Ya tengo cuenta</p>
        </div>
        <button id="btn-out" style="display:none; background:#64748b" onclick="logout()">Cerrar Sesión</button>
        <button onclick="cerrarLogin()" style="background:none; color:var(--text)">Cerrar</button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem("products")) || [];
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;

    // --- RENDERIZADO ---
    function render(data = products) {
        const container = document.getElementById("products");
        container.innerHTML = "";
        
        data.forEach((p, i) => {
            let htmlPrecios = `<div class="price">$${p.p_ind}</div>`;
            if(p.p_x2 > 0) htmlPrecios += `<div class="promo-x2">Promo x2: $${p.p_x2}</div>`;
            
            // Solo ver mayorista si hay sesión iniciada
            if(currentUser) {
                htmlPrecios += `<div class="badge-may">Mayorista: $${p.p_may}</div>`;
            }

            container.innerHTML += `
                <div class="card">
                    <img src="${p.img || 'https://via.placeholder.com/200'}">
                    <h4>${p.name}</h4>
                    ${htmlPrecios}
                    <p style="font-size:12px; opacity:0.7">Stock: ${p.stock}</p>
                    <button onclick="addCart(${i})">Agregar</button>
                </div>
            `;
        });
    }

    // --- BUSCADOR ---
    function filtrar() {
        let term = document.getElementById("busqueda").value.toLowerCase();
        let filtrados = products.filter(p => p.name.toLowerCase().includes(term));
        render(filtrados);
    }

    // --- FUNCIONES SIDEBAR & UI ---
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }
    function toggleLightMode() { document.body.classList.toggle("light-mode"); }

    // --- ADMIN ---
    function openAdmin() {
        if(prompt("Contraseña:") === "admin") {
            document.getElementById("adminPanel").style.display = "block";
            toggleSidebar();
            cargarAdmin();
        } else { alert("Error"); }
    }

    function guardar() {
        let index = document.getElementById("editIndex").value;
        let prod = {
            name: document.getElementById("n").value,
            p_ind: parseInt(document.getElementById("p_ind").value),
            p_x2: parseInt(document.getElementById("p_x2").value) || 0,
            p_may: parseInt(document.getElementById("p_may").value),
            stock: parseInt(document.getElementById("stock").value),
            img: document.getElementById("img").value
        };
        if(index === "") products.push(prod);
        else products[index] = prod;
        
        localStorage.setItem("products", JSON.stringify(products));
        render(); cargarAdmin();
        document.getElementById("editIndex").value = "";
    }

    function cargarAdmin() {
        let l = document.getElementById("listaAdmin");
        l.innerHTML = products.map((p, i) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px">
                <span>${p.name}</span>
                <button style="width:auto; margin:0; padding:2px 10px" onclick="eliminar(${i})">X</button>
            </div>
        `).join("");
    }

    function eliminar(i) {
        products.splice(i, 1);
        localStorage.setItem("products", JSON.stringify(products));
        render(); cargarAdmin();
    }

    // --- SESIÓN ---
    function abrirLogin() { document.getElementById("loginModal").style.display="flex"; }
    function cerrarLogin() { document.getElementById("loginModal").style.display="none"; }
    function cambiarModo(reg) {
        document.getElementById("box-login").style.display = reg ? "none" : "block";
        document.getElementById("box-reg").style.display = reg ? "block" : "none";
    }

    function registrar() {
        users.push({user: u.value, pass: pass.value});
        localStorage.setItem("users", JSON.stringify(users));
        alert("¡Cuenta creada!"); cambiarModo(false);
    }

    function login() {
        let found = users.find(x => x.user === u.value && x.pass === pass.value);
        if(found) {
            currentUser = found;
            localStorage.setItem("currentUser", JSON.stringify(found));
            location.reload();
        } else alert("Error de datos");
    }

    function logout() {
        localStorage.removeItem("currentUser");
        location.reload();
    }

    if(currentUser) {
        document.getElementById("logTitle").innerText = "Hola, " + currentUser.user;
        document.getElementById("box-login").style.display = "none";
        document.getElementById("btn-out").style.display = "block";
    }

    render();
</script>
</body>
</html>
