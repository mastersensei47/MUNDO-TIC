<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO REPUESTOS - ADMIN FULL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
            --input-bg: rgba(30, 41, 59, 0.7);
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --input-bg: #f1f5f9;
        }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; }

        /* HEADER */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 25px; background: var(--card); position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header-icons { display: flex; gap: 20px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 22px; transition: 0.2s; position: relative; }

        /* BUSCADOR */
        .search-container { flex: 1; max-width: 400px; margin: 0 20px; }
        .search-bar { width: 100%; padding: 10px 18px; border-radius: 10px; border: 1px solid rgba(128,128,128,0.3); background: var(--input-bg); color: inherit; outline: none; }

        /* GRID */
        .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:20px; padding:20px; }
        .product-card { background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(128,128,128,0.1); position: relative; }
        .product-card img { width: 100%; height: 120px; object-fit: contain; }

        /* PANELES Y MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 4000; padding: 20px; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: var(--input-bg); color: inherit; border: 1px solid rgba(128,128,128,0.2); border-radius: 10px; box-sizing: border-box; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 5px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-back { background: transparent; color: var(--text); border: 1px solid rgba(128,128,128,0.3); margin-top: 15px; }

        /* TABLAS ADMIN */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid rgba(128,128,128,0.2); }
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(128,128,128,0.2); padding-bottom: 10px; }
        .tab-link { cursor: pointer; opacity: 0.6; font-weight: bold; }
        .tab-link.active { opacity: 1; color: var(--accent); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 2000; }
        .overlay.active { display: block; }
        
        #cartDrawer { position: fixed; right: -400px; top: 0; width: 320px; height: 100%; background: var(--card); transition: 0.3s; z-index: 3000; padding: 25px; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #cartDrawer.active { right: 0; }
    </style>
</head>
<body>

<header>
    <b style="font-size:20px; cursor:pointer" onclick="location.reload()">NEO<span style="color:var(--accent)">REPUESTOS</span></b>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar..." onkeyup="render()">
    </div>
    <div class="header-icons">
        <span class="icon-btn" onclick="toggleTheme()">🌗</span>
        <span class="icon-btn" onclick="abrirModal('loginModal')">👤</span>
        <span class="icon-btn" onclick="accesoAdmin()">⚙️</span>
        <div class="icon-btn" onclick="toggleCart()">🛒 <b id="cartCount" style="position:absolute; top:-8px; right:-10px; background:var(--danger); font-size:10px; padding:2px 5px; border-radius:50%">0</b></div>
    </div>
</header>

<div class="overlay" id="mainOverlay" onclick="closeAll()"></div>
<div class="products-grid" id="productsCont"></div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:380px">
        <div id="loginView">
            <h2>Ingreso</h2>
            <input id="userInp" placeholder="Usuario">
            <input id="passInp" type="password" placeholder="Contraseña">
            <button class="btn btn-primary" onclick="checkLogin()">ENTRAR</button>
            <button class="btn btn-back" onclick="closeAll()">VOLVER</button>
            <p style="text-align:center; font-size:12px; margin-top:15px">¿Eres nuevo? <a href="#" onclick="switchAuth(true)" style="color:var(--accent)">Solicitar cuenta</a></p>
        </div>
        <div id="regView" style="display:none">
            <h2>Solicitud Mayorista</h2>
            <input id="regNom" placeholder="Nombre / Negocio">
            <input id="regCuit" placeholder="CUIT / DNI">
            <button class="btn btn-primary" onclick="enviarSolicitud()">ENVIAR DATOS</button>
            <button class="btn btn-back" onclick="switchAuth(false)">VOLVER</button>
        </div>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 style="margin:0">Panel Admin</h2>
            <span onclick="closeAll()" style="cursor:pointer; font-size:24px">✕</span>
        </div>
        
        <div class="tab-nav">
            <span class="tab-link active" id="t-pro" onclick="showTab('pro')">PRODUCTOS</span>
            <span class="tab-link" id="t-sol" onclick="showTab('sol')">SOLICITUDES</span>
        </div>

        <div id="tab-pro">
            <div style="background:rgba(128,128,128,0.1); padding:15px; border-radius:15px; margin-bottom:20px">
                <input type="hidden" id="editId">
                <input id="fNom" placeholder="Nombre">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                    <input id="fPre" type="number" placeholder="Precio Min">
                    <input id="fPreM" type="number" placeholder="Precio May">
                </div>
                <input id="fPromo" placeholder="Promoción (ej: 2x1)">
                <input id="fImg" placeholder="URL de Imagen">
                <button class="btn btn-primary" onclick="guardarProducto()">GUARDAR PRODUCTO</button>
            </div>
            <table>
                <thead><tr><th>Nombre</th><th>Acción</th></tr></thead>
                <tbody id="adminProBody"></tbody>
            </table>
        </div>

        <div id="tab-sol" style="display:none">
            <table>
                <thead><tr><th>Nombre</th><th>CUIT</th><th>Acción</th></tr></thead>
                <tbody id="adminSolBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="cartDrawer">
    <h2>Tu Carrito</h2>
    <div id="cartList" style="flex-grow:1; overflow-y:auto"></div>
    <div style="margin-top:20px">
        <h3 id="cartTotal">Total: $0</h3>
        <button class="btn btn-primary" style="background:#25d366" onclick="enviarWhatsApp()">WHATSAPP</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let repuestos = [];
    let carrito = [];
    let esMayorista = sessionStorage.getItem("isMay") === "true";

    // SINCRONIZACIÓN FIREBASE
    db.collection("productos").onSnapshot(snap => {
        repuestos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
        updateAdminProds();
    });

    db.collection("solicitudes_mayoristas").onSnapshot(snap => {
        const body = document.getElementById("adminSolBody");
        body.innerHTML = snap.docs.map(doc => {
            const s = doc.data();
            return `<tr><td>${s.nombre}</td><td>${s.cuit}</td>
                <td>
                    <button onclick="aprobarSoli('${doc.id}')" style="color:green; background:none; border:none; cursor:pointer">✅</button>
                    <button onclick="eliminarSoli('${doc.id}')" style="color:red; background:none; border:none; cursor:pointer; margin-left:10px">🗑️</button>
                </td></tr>`;
        }).join("");
    });

    function render() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        cont.innerHTML = repuestos.filter(r => r.nombre.toLowerCase().includes(query)).map(r => `
            <div class="product-card">
                <img src="${r.imagen || 'https://via.placeholder.com/150'}">
                <h4>${r.nombre}</h4>
                <div style="color:var(--accent); font-weight:bold">$${esMayorista ? r.precio_may : r.precio}</div>
                <button class="btn btn-primary" onclick="addCar('${r.id}')">AGREGAR</button>
            </div>`).join("");
    }

    // LÓGICA ADMIN
    async function guardarProducto() {
        const id = document.getElementById("editId").value;
        const d = {
            nombre: document.getElementById("fNom").value,
            precio: Number(document.getElementById("fPre").value),
            precio_may: Number(document.getElementById("fPreM").value),
            promo: document.getElementById("fPromo").value,
            imagen: document.getElementById("fImg").value
        };
        id ? await db.collection("productos").doc(id).update(d) : await db.collection("productos").add(d);
        limpiarForm();
    }

    function updateAdminProds() {
        document.getElementById("adminProBody").innerHTML = repuestos.map(r => `
            <tr><td>${r.nombre}</td>
            <td>
                <button onclick="editarP('${r.id}')" style="color:var(--accent); border:none; background:none; cursor:pointer">✏️</button>
                <button onclick="eliminarP('${r.id}')" style="color:red; border:none; background:none; cursor:pointer">🗑️</button>
            </td></tr>`).join("");
    }

    function editarP(id) {
        const r = repuestos.find(x => x.id === id);
        document.getElementById("editId").value = r.id;
        document.getElementById("fNom").value = r.nombre;
        document.getElementById("fPre").value = r.precio;
        document.getElementById("fPreM").value = r.precio_may;
        document.getElementById("fPromo").value = r.promo;
        document.getElementById("fImg").value = r.imagen;
    }

    async function eliminarP(id) { if(confirm("¿Eliminar?")) await db.collection("productos").doc(id).delete(); }
    async function aprobarSoli(id) { alert("Cliente aprobado!"); await db.collection("solicitudes_mayoristas").doc(id).delete(); }
    async function eliminarSoli(id) { await db.collection("solicitudes_mayoristas").doc(id).delete(); }

    function showTab(t) {
        document.getElementById("tab-pro").style.display = t === 'pro' ? 'block' : 'none';
        document.getElementById("tab-sol").style.display = t === 'sol' ? 'block' : 'none';
        document.querySelectorAll(".tab-link").forEach(l => l.classList.remove("active"));
        document.getElementById("t-"+t).classList.add("active");
    }

    // UI Y OTROS
    function accesoAdmin() { if(prompt("Clave Admin:") === "admin") abrirModal("adminModal"); }
    function abrirModal(id) { document.getElementById(id).style.display = "flex"; }
    function closeAll() { 
        document.querySelectorAll(".modal").forEach(m => m.style.display = "none"); 
        document.getElementById("cartDrawer").classList.remove("active");
        document.getElementById("mainOverlay").classList.remove("active");
    }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function toggleTheme() { document.body.classList.toggle("light"); }
    function switchAuth(r) { document.getElementById("loginView").style.display = r?'none':'block'; document.getElementById("regView").style.display = r?'block':'none'; }
    function checkLogin() { if(document.getElementById("userInp").value === "mayorista") { esMayorista=true; sessionStorage.setItem("isMay","true"); closeAll(); render(); } }
    async function enviarSolicitud() { await db.collection("solicitudes_mayoristas").add({ nombre: document.getElementById("regNom").value, cuit: document.getElementById("regCuit").value }); alert("Solicitud enviada!"); switchAuth(false); }
    function limpiarForm() { document.getElementById("editId").value=""; document.querySelectorAll("#tab-pro input").forEach(i => i.value=""); }
</script>
</body>
</html>
