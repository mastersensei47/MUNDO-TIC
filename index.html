<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO REPUESTOS - Versión Final Full</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #2563eb;
            --sidebar-bg: #1e40af; --success: #10b981; --promo: #f59e0b;
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --sidebar-bg: #2563eb;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); transition:0.3s; }
        
        /* HEADER */
        header { 
            display:flex; justify-content:space-between; align-items:center; 
            padding:10px 20px; background:var(--card); position:sticky; top:0; z-index:1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .search-bar input { padding:8px 15px; border-radius:20px; border:1px solid #444; background:rgba(0,0,0,0.1); color:inherit; width:180px; }

        /* SIDEBAR */
        .sidebar { 
            position: fixed; left: -280px; top: 0; width: 260px; height: 100%; 
            background: var(--sidebar-bg); color: white; transition: 0.3s; z-index: 2000; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 0; color: white; text-decoration: none; border-bottom: 1px solid #ffffff22; }

        /* PRODUCTOS */
        .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; padding:20px; }
        .card { background:var(--card); padding:15px; border-radius:15px; text-align:center; position:relative; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .card img { width: 100%; height: 120px; object-fit: contain; }
        .promo-badge { position:absolute; top:10px; right:10px; background:var(--promo); color:black; font-size:10px; font-weight:bold; padding:3px 7px; border-radius:5px; }

        /* CARRITO */
        .cart-drawer {
            position: fixed; right: -380px; top: 0; width: 340px; height: 100%;
            background: var(--card); transition: 0.3s; z-index: 3000; padding: 20px; 
            display: flex; flex-direction: column; box-shadow: -5px 0 20px rgba(0,0,0,0.5); box-sizing: border-box;
        }
        .cart-drawer.active { right: 0; }
        .cart-items { flex-grow: 1; overflow-y: auto; margin: 15px 0; }
        .qty-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 8px; }
        .qty-btn { background: var(--accent); color: white; border: none; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; }

        /* MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 4000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; position: relative; }
        
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; background: rgba(0,0,0,0.1); color: inherit; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .btn-fill { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-wa { background: #25d366; color: white; margin-top: 10px; }

        .form-envio { background: rgba(0,0,0,0.1); padding: 10px; border-radius: 10px; display: none; margin-top: 10px; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px">
        <span onclick="toggleSidebar()" style="cursor:pointer; font-size: 20px;">☰</span>
        <b onclick="location.reload()" style="cursor:pointer">NEO REPUESTOS</b>
    </div>
    <div class="search-bar"><input type="text" id="find" placeholder="Buscar..." onkeyup="render()"></div>
    <div style="display:flex; gap:12px; align-items:center">
        <span onclick="toggleMode()" style="cursor:pointer">🌗</span>
        <span onclick="abrirModal('loginMod')" id="userStatus">👤</span>
        <span onclick="abrirAdmin()" style="cursor:pointer">🔑</span>
        <div onclick="toggleCart()" style="cursor:pointer; position:relative">
            🛒 <b id="cCount" style="position:absolute; top:-8px; right:-8px; background:red; color:white; font-size:10px; padding:2px 5px; border-radius:50%">0</b>
        </div>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<nav class="sidebar" id="sidebar">
    <h3>MENÚ</h3>
    <a href="#" onclick="closeAll()">🏠 Inicio</a>
    <a href="#" onclick="abrirModal('loginMod')">👤 Mayoristas</a>
    <a href="https://wa.me/5493434508948">📞 Contacto</a>
</nav>

<div class="products" id="productsCont"></div>

<div class="cart-drawer" id="cartDrawer">
    <h3>Mi Carrito</h3>
    <div class="cart-items" id="cartList"></div>
    <div style="border-top:1px solid #444; padding-top:10px">
        <div id="cTotal" style="font-size:18px; font-weight:bold">Total: $0</div>
        <div id="saveMsg" style="color:var(--success); font-size:12px; margin-bottom:10px"></div>
        
        <label>Entrega:</label>
        <select id="delivery" onchange="checkEnvio()">
            <option value="retiro">Retiro en Local</option>
            <option value="envio">Envío a Domicilio</option>
        </select>

        <div id="shipForm" class="form-envio">
            <input id="fName" placeholder="Nombre completo">
            <input id="fDir" placeholder="Dirección completa">
            <input id="fTel" placeholder="Teléfono">
            <textarea id="fObs" placeholder="Aclaraciones..."></textarea>
        </div>

        <button class="btn-fill btn-wa" onclick="sendOrder()">Pedir por WhatsApp</button>
        <button onclick="toggleCart()" style="background:none; color:inherit; border:none; margin-top:10px; cursor:pointer">Cerrar</button>
    </div>
</div>

<div class="modal" id="loginMod">
    <div class="modal-content" style="max-width:300px">
        <h3>Login Mayorista</h3>
        <div id="logFields">
            <input id="u" placeholder="Usuario">
            <input id="p_log" type="password" placeholder="Contraseña">
            <button class="btn-fill" onclick="doLogin()">Entrar</button>
        </div>
        <div id="logOut" style="display:none; text-align:center">
            <p>Sesión Mayorista Activa</p>
            <button onclick="doLogout()" style="background:red" class="btn-fill">Cerrar Sesión</button>
        </div>
        <button onclick="cerrarModales()" style="margin-top:10px; background:none; color:inherit; border:none; cursor:pointer">Cancelar</button>
    </div>
</div>

<div class="modal" id="adminMod">
    <div class="modal-content" style="max-height:90vh; overflow-y:auto">
        <h3>Panel Admin</h3>
        <input type="hidden" id="eid">
        <input id="an" placeholder="Nombre">
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px">
            <input id="ap" type="number" placeholder="Precio Min.">
            <input id="apm" type="number" placeholder="Precio May.">
            <input id="as" type="number" placeholder="Stock">
        </div>
        <select id="apromo" onchange="checkAp()">
            <option value="">Sin Promo</option>
            <option value="2x1">2x1</option>
            <option value="3x2">3x2</option>
            <option value="pack">Pack x2</option>
        </select>
        <input id="appack" type="number" placeholder="Precio x 2 unidades" style="display:none">
        <input id="ai" placeholder="URL Imagen">
        <button class="btn-fill" onclick="saveFirebase()">Guardar</button>
        <hr>
        <div id="aList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let prods = [];
    let cart = [];
    let isM = sessionStorage.getItem("isM") === "true";

    db.collection("productos").onSnapshot(snap => {
        prods = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
        adminList();
    });

    function getP(p) { return (isM && p.precio_may > 0) ? p.precio_may : p.precio; }

    function calcSub(p, q) {
        let base = getP(p);
        if(p.promo === "2x1") return Math.ceil(q / 2) * base;
        if(p.promo === "3x2") return (Math.floor(q / 3) * 2 + (q % 3)) * base;
        if(p.promo === "pack" && q >= 2) return Math.floor(q / 2) * p.ppack + (q % 2 * base);
        return q * base;
    }

    function render() {
        const val = document.getElementById("find").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        cont.innerHTML = prods.filter(x => x.nombre.toLowerCase().includes(val)).map(p => `
            <div class="card">
                ${p.promo ? `<div class="promo-badge">${p.promo.toUpperCase()}</div>` : ''}
                <img src="${p.imagen || 'https://via.placeholder.com/150'}">
                <h4 style="margin:8px 0; font-size:14px">${p.nombre}</h4>
                <div style="font-weight:bold; color:var(--accent)">$${getP(p)}</div>
                <div style="font-size:11px; opacity:0.6">Stock: ${p.stock}</div>
                <button class="btn-fill" style="margin-top:10px; font-size:12px" onclick="add('${p.id}')" ${p.stock <= 0 ? 'disabled style="background:gray"' : ''}>
                    ${p.stock > 0 ? 'Agregar' : 'Sin Stock'}
                </button>
            </div>`).join("");
        document.getElementById("userStatus").style.color = isM ? "var(--success)" : "inherit";
        document.getElementById("logFields").style.display = isM ? "none" : "block";
        document.getElementById("logOut").style.display = isM ? "block" : "none";
    }

    function add(id) {
        const p = prods.find(x => x.id === id);
        const item = cart.find(c => c.id === id);
        if(item) { if(item.qty < p.stock) item.qty++; } else { cart.push({id, qty: 1}); }
        upCart();
    }

    function upCart() {
        const l = document.getElementById("cartList");
        let t = 0; let ah = 0;
        l.innerHTML = cart.map((c, i) => {
            const p = prods.find(x => x.id === c.id);
            const sub = calcSub(p, c.qty);
            t += sub; ah += (getP(p) * c.qty - sub);
            return `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                <div style="font-size:13px"><b>${p.nombre}</b><br>$${sub}</div>
                <div class="qty-box">
                    <button class="qty-btn" onclick="mod(${i},-1)">-</button>
                    <span>${c.qty}</span>
                    <button class="qty-btn" onclick="mod(${i},1)">+</button>
                </div>
            </div>`;
        }).join("");
        document.getElementById("cTotal").innerText = "Total: $" + t;
        document.getElementById("saveMsg").innerText = ah > 0 ? `Ahorro: $${ah}` : "";
        document.getElementById("cCount").innerText = cart.reduce((a,b) => a + b.qty, 0);
    }

    function mod(i, d) {
        const p = prods.find(x => x.id === cart[i].id);
        if(d > 0 && cart[i].qty >= p.stock) return;
        cart[i].qty += d;
        if(cart[i].qty <= 0) cart.splice(i, 1);
        upCart();
    }

    async function sendOrder() {
        if(cart.length === 0) return;
        let tipo = document.getElementById("delivery").value;
        let msg = `*PEDIDO NEO REPUESTOS*\n${isM ? '(MAYORISTA)\n' : ''}\n`;
        for(let c of cart) {
            const p = prods.find(x => x.id === c.id);
            msg += `- ${p.nombre} x${c.qty} = $${calcSub(p, c.qty)}\n`;
            await db.collection("productos").doc(p.id).update({ stock: p.stock - c.qty });
        }
        msg += `\n*TOTAL: ${document.getElementById("cTotal").innerText}*`;
        if(tipo === "envio") msg += `\n\n*ENVÍO:* \nNombre: ${document.getElementById("fName").value}\nDir: ${document.getElementById("fDir").value}\nTel: ${document.getElementById("fTel").value}`;
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
        cart = []; upCart(); closeAll();
    }

    function doLogin() {
        if(document.getElementById("u").value === "mayorista" && document.getElementById("p_log").value === "vip") {
            isM = true; sessionStorage.setItem("isM", "true"); cerrarModales(); render();
        } else { alert("Error"); }
    }
    function doLogout() { isM = false; sessionStorage.setItem("isM", "false"); cerrarModales(); render(); }
    
    async function saveFirebase() {
        const id = document.getElementById("eid").value;
        const data = {
            nombre: document.getElementById("an").value,
            precio: Number(document.getElementById("ap").value),
            precio_may: Number(document.getElementById("apm").value),
            stock: Number(document.getElementById("as").value),
            promo: document.getElementById("apromo").value,
            ppack: Number(document.getElementById("appack").value) || 0,
            imagen: document.getElementById("ai").value
        };
        id ? await db.collection("productos").doc(id).update(data) : await db.collection("productos").add(data);
        document.getElementById("eid").value=""; 
        alert("Guardado!");
    }

    function adminList() {
        document.getElementById("aList").innerHTML = prods.map(p => `
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px">
                <span>${p.nombre}</span>
                <button onclick="editP('${p.id}')" style="width:auto; padding:2px 5px">✏️</button>
            </div>`).join("");
    }

    function editP(id) {
        const p = prods.find(x => x.id === id);
        document.getElementById("eid").value = p.id;
        document.getElementById("an").value = p.nombre;
        document.getElementById("ap").value = p.precio;
        document.getElementById("apm").value = p.precio_may;
        document.getElementById("as").value = p.stock;
        document.getElementById("apromo").value = p.promo || "";
        document.getElementById("appack").value = p.ppack || 0;
        checkAp();
    }

    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
    function toggleMode() { document.body.classList.toggle("light"); }
    function checkEnvio() { document.getElementById("shipForm").style.display = document.getElementById("delivery").value === "envio" ? "block" : "none"; }
    function checkAp() { document.getElementById("appack").style.display = document.getElementById("apromo").value === "pack" ? "block" : "none"; }
    function abrirModal(id) { document.getElementById(id).style.display = "flex"; }
    function cerrarModales() { document.querySelectorAll(".modal").forEach(m => m.style.display="none"); }
    function closeAll() { document.querySelectorAll(".active").forEach(el => el.classList.remove("active")); cerrarModales(); }
    function abrirAdmin() { if(prompt("Clave:") === "admin") abrirModal("adminMod"); }
</script>
</body>
</html>
