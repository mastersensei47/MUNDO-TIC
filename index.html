<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repuestos PRO - Firebase</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #2563eb; --success: #10b981; }
        body { margin:0; font-family: sans-serif; background:var(--bg); color:var(--text); transition:.3s; }
        header { display:flex; justify-content:space-between; padding:10px 20px; background:var(--card); align-items:center; position:sticky; top:0; z-index:100; }
        .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; padding:20px; }
        .card { background:var(--card); padding:15px; border-radius:12px; text-align:center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        .admin-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .admin-content { background: var(--card); padding: 20px; border-radius: 15px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        input { width: 100%; margin: 5px 0; padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 5px; }
        .tab-btn { background: #334155; flex: 1; margin: 0 2px; font-size: 12px; }
        .badge { background: red; color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold">NEO REPUESTOS</div>
    <div style="display:flex; gap:15px; align-items:center">
        <span onclick="abrirLogin()" style="cursor:pointer">👤</span>
        <span onclick="abrirAdmin()" style="cursor:pointer">🔑</span>
        <span onclick="alert('Carrito en desarrollo')" style="cursor:pointer">🛒</span>
    </div>
</header>

<div class="products" id="productsCont">
    <p style="text-align:center; grid-column: 1/-1;">Conectando con Firebase...</p>
</div>

<div class="admin-modal" id="adminModal">
    <div class="admin-content">
        <span style="float:right; cursor:pointer" onclick="cerrarModales()">✕</span>
        <div style="display:flex; margin-bottom:15px">
            <button class="tab-btn" onclick="showTab('tab-add')">➕ Nuevo</button>
            <button class="tab-btn" onclick="showTab('tab-list')">📦 Lista</button>
            <button class="tab-btn" onclick="showTab('tab-users')">👥 Usuarios</button>
        </div>

        <div id="tab-add">
            <h3 id="formTitle">Gestionar Producto</h3>
            <input id="prodId" type="hidden">
            <input id="n" placeholder="Nombre (ej: Yerba)">
            <input id="p" type="number" placeholder="Precio">
            <input id="img" placeholder="URL de Imagen">
            <button onclick="guardarFirebase()" style="background:var(--success)">Guardar en la Nube</button>
        </div>

        <div id="tab-list" style="display:none">
            <h3>Productos en Firebase</h3>
            <div id="listaFirebase"></div>
        </div>

        <div id="tab-users" style="display:none">
            <h3>Mayoristas</h3>
            <div id="listaUsers"></div>
        </div>
    </div>
</div>

<script>
    // 1. CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productosLocal = [];

    // 2. ESCUCHAR CAMBIOS EN TIEMPO REAL
    db.collection("productos").onSnapshot((snapshot) => {
        productosLocal = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
        cargarListaAdmin();
    });

    // 3. RENDERIZADO
    function render() {
        const cont = document.getElementById("productsCont");
        if (productosLocal.length === 0) {
            cont.innerHTML = "<p>No hay productos en la base de datos.</p>";
            return;
        }
        cont.innerHTML = productosLocal.map(p => `
            <div class="card">
                <img src="${p.imagen || 'https://via.placeholder.com/150'}">
                <h4>${p.nombre}</h4>
                <p style="color:var(--accent); font-weight:bold">$${p.precio}</p>
                <button onclick="alert('Agregado')">Agregar</button>
            </div>
        `).join("");
    }

    // 4. LÓGICA DE FIREBASE (GUARDAR / EDITAR)
    async function guardarFirebase() {
        const id = document.getElementById("prodId").value;
        const nombre = document.getElementById("n").value;
        const precio = Number(document.getElementById("p").value);
        const imagen = document.getElementById("img").value;

        if (!nombre || !precio) return alert("Faltan datos");

        const data = { nombre, precio, imagen };

        try {
            if (id) {
                await db.collection("productos").doc(id).update(data);
                alert("Actualizado!");
            } else {
                await db.collection("productos").add(data);
                alert("Creado!");
            }
            limpiarForm();
            showTab('tab-list');
        } catch (e) {
            console.error(e);
            alert("Error al guardar");
        }
    }

    async function eliminarProducto(id) {
        if (confirm("¿Eliminar este producto de la nube?")) {
            await db.collection("productos").doc(id).delete();
        }
    }

    // 5. INTERFAZ ADMIN
    function cargarListaAdmin() {
        const cont = document.getElementById("listaFirebase");
        cont.innerHTML = productosLocal.map(p => `
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #444; padding:5px 0;">
                <span style="font-size:12px">${p.nombre} ($${p.precio})</span>
                <div>
                    <button onclick="editarLocal('${p.id}')" style="width:auto; padding:2px 8px; background:orange">✏️</button>
                    <button onclick="eliminarProducto('${p.id}')" style="width:auto; padding:2px 8px; background:red">✕</button>
                </div>
            </div>
        `).join("");
    }

    function editarLocal(id) {
        const p = productosLocal.find(x => x.id === id);
        document.getElementById("prodId").value = p.id;
        document.getElementById("n").value = p.nombre;
        document.getElementById("p").value = p.precio;
        document.getElementById("img").value = p.imagen;
        document.getElementById("formTitle").innerText = "Editando...";
        showTab('tab-add');
    }

    function showTab(tab) {
        document.getElementById("tab-add").style.display = tab === 'tab-add' ? 'block' : 'none';
        document.getElementById("tab-list").style.display = tab === 'tab-list' ? 'block' : 'none';
        document.getElementById("tab-users").style.display = tab === 'tab-users' ? 'block' : 'none';
    }

    function abrirAdmin() { if(prompt("Clave:") === "admin") document.getElementById("adminModal").style.display = "flex"; }
    function cerrarModales() { document.getElementById("adminModal").style.display = "none"; limpiarForm(); }
    function limpiarForm() {
        document.getElementById("prodId").value = "";
        document.getElementById("n").value = "";
        document.getElementById("p").value = "";
        document.getElementById("img").value = "";
        document.getElementById("formTitle").innerText = "Gestionar Producto";
    }
</script>

</body>
</html>
