<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Importados</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header input{
padding:8px;
width:250px;
border-radius:5px;
border:none;
}

.container{
display:flex;
}

.sidebar{
width:200px;
background:#1f2d3d;
color:white;
padding:20px;
}

.sidebar button{
display:block;
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
background:#34495e;
color:white;
cursor:pointer;
}

.products{
flex:1;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:8px;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card button{
background:#27ae60;
border:none;
color:white;
padding:8px;
margin-top:10px;
cursor:pointer;
}

.cart{
width:250px;
background:#ecf0f1;
padding:20px;
}

</style>
</head>

<body>

<header>

<h2>Tienda Importados</h2>

<input id="buscar" placeholder="Buscar producto">

</header>

<div class="container">

<div class="sidebar">

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('ropa')">Ropa</button>
<button onclick="filtrar('electronica')">Electrónica</button>

</div>

<div class="products" id="productos"></div>

<div class="cart">

<h3>Carrito</h3>

<div id="lista"></div>

<p>Total: $<span id="total">0</span></p>

<button onclick="whatsapp()">Enviar pedido</button>

</div>

</div>

<script>

const productos=[
{
nombre:"Cafetera",
precio:40,
categoria:"electronica",
img:"https://picsum.photos/200?1"
},
{
nombre:"Olla eléctrica",
precio:60,
categoria:"electronica",
img:"https://picsum.photos/200?2"
},
{
nombre:"Zapatos",
precio:35,
categoria:"ropa",
img:"https://picsum.photos/200?3"
},
{
nombre:"Camisa",
precio:25,
categoria:"ropa",
img:"https://picsum.photos/200?4"
}
]

let carrito=[]

function mostrar(lista){

const cont=document.getElementById("productos")

cont.innerHTML=""

lista.forEach((p,i)=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.nombre}</h4>

<p>$${p.precio}</p>

<button onclick="agregar(${i})">

Agregar

</button>

</div>

`

})

}

function filtrar(cat){

if(cat=="todos"){

mostrar(productos)

return

}

mostrar(productos.filter(p=>p.categoria==cat))

}

function agregar(i){

carrito.push(productos[i])

actualizar()

}

function actualizar(){

const lista=document.getElementById("lista")

lista.innerHTML=""

let total=0

carrito.forEach(p=>{

lista.innerHTML+=`<div>${p.nombre} - $${p.precio}</div>`

total+=p.precio

})

document.getElementById("total").innerText=total

}

function whatsapp(){

let texto="Pedido:%0A"

carrito.forEach(p=>{

texto+=p.nombre+" - $"+p.precio+"%0A"

})

window.open("https://wa.me/?text="+texto)

}

document.getElementById("buscar").addEventListener("input",e=>{

const val=e.target.value.toLowerCase()

mostrar(productos.filter(p=>p.nombre.toLowerCase().includes(val)))

})

mostrar(productos)

</script>

</body>
</html>
